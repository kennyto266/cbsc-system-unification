[tool:pytest]
# 測試配置
testpaths = src/api/strategies/tests
python_files = test_*.py *_test.py
python_classes = Test* *Tests
python_functions = test_*

# 最小版本要求
minversion = 6.0

# 添加選項
addopts =
    --strict-markers
    --strict-config
    --verbose
    --tb=short
    --cov=src/api/strategies
    --cov-report=html
    --cov-report=term-missing
    --cov-fail-under=80
    --durations=10

# 標記定義
markers =
    unit: Unit tests
    integration: Integration tests
    performance: Performance tests
    slow: Slow running tests
    external: Tests that require external dependencies
    websocket: WebSocket tests
    api: API tests

# 測試發現
collect_ignore = [
    "setup.py",
    "conftest.py"
]

# 過濾警告
filterwarnings =
    ignore::UserWarning
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# 日誌配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 並行測試
# addopts = -n auto  # 需要安裝 pytest-xdist

# JUnit XML 報告
# addopts = --junitxml=test-results.xml