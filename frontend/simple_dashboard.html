<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSC策略管理Dashboard - 简化版</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
        }

        .dashboard-container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 32px;
            border-bottom: 2px solid #1890ff;
            padding-bottom: 16px;
        }

        .header h1 {
            color: #1890ff;
            margin: 0;
            font-size: 2.5em;
        }

        .status-indicator {
            display: inline-block;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            margin-right: 8px;
        }

        .status-connected {
            background: #52c41a;
            box-shadow: 0 0 8px rgba(82, 196, 26, 0.5);
        }

        .status-disconnected {
            background: #ff4d4f;
            box-shadow: 0 0 8px rgba(255, 77, 79, 0.5);
        }

        .websocket-status {
            margin: 20px 0;
            padding: 16px;
            background: #f0f9ff;
            border: 2px solid #91caff;
            border-radius: 8px;
            text-align: center;
            font-size: 1.1em;
            font-weight: bold;
        }

        .strategy-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin: 24px 0;
        }

        .strategy-card {
            background: #fafafa;
            border: 2px solid #d9d9d9;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .strategy-card:hover {
            border-color: #1890ff;
            box-shadow: 0 4px 12px rgba(24, 144, 255, 0.15);
        }

        .strategy-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #1890ff;
            margin-bottom: 12px;
        }

        .strategy-signal {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 4px;
            font-weight: bold;
            margin: 8px 0;
        }

        .signal-buy {
            background: #f6ffed;
            color: #52c41a;
            border: 1px solid #b7eb8f;
        }

        .signal-sell {
            background: #fff2e8;
            color: #fa8c16;
            border: 1px solid #ffd591;
        }

        .signal-hold {
            background: #f0f0f0;
            color: #666;
            border: 1px solid #d9d9d9;
        }

        .strategy-metrics {
            margin-top: 12px;
            font-size: 0.9em;
            color: #666;
        }

        .metric {
            margin: 4px 0;
            display: flex;
            justify-content: space-between;
        }

        .metric-value {
            font-weight: bold;
            color: #333;
        }

        .last-update {
            text-align: center;
            margin-top: 24px;
            color: #666;
            font-size: 0.9em;
        }

        .refresh-btn {
            background: #1890ff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1em;
            margin: 10px;
        }

        .refresh-btn:hover {
            background: #40a9ff;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <div class="header">
            <h1>🎯 CBSC策略管理Dashboard</h1>
            <p>实时量化交易策略监控系统</p>
        </div>

        <div class="websocket-status">
            <span class="status-indicator status-disconnected" id="statusIndicator"></span>
            <span id="statusText">正在连接WebSocket...</span>
            <button class="refresh-btn" onclick="reconnectWebSocket()">重新连接</button>
        </div>

        <div id="loadingMessage" class="loading">
            <p>📡 正在加载策略数据...</p>
        </div>

        <div class="strategy-grid" id="strategyGrid" style="display: none;">
            <!-- 策略卡片将通过JavaScript动态生成 -->
        </div>

        <div class="last-update" id="lastUpdate">
            最后更新时间: --
        </div>
    </div>

    <script>
        let ws = null;
        let reconnectAttempts = 0;
        const maxReconnectAttempts = 5;

        // 模拟初始策略数据
        const mockStrategies = [
            {
                name: 'DirectRSI',
                displayName: '直接RSI策略',
                description: '基于牛熊比例的RSI计算',
                signal: 'HOLD',
                strength: 0.65,
                confidence: 0.78,
                performance: {
                    sharpe_ratio: 1.85,
                    max_drawdown: -0.08,
                    win_rate: 0.62
                }
            },
            {
                name: 'SentimentMomentum',
                displayName: '情绪动量策略',
                description: 'MACD风格的情緒变化率分析',
                signal: 'BUY',
                strength: 0.82,
                confidence: 0.91,
                performance: {
                    sharpe_ratio: 2.15,
                    max_drawdown: -0.12,
                    win_rate: 0.71
                }
            },
            {
                name: 'CompositeIndex',
                displayName: '复合指標策略',
                description: '多維度情緒布林帶分析',
                signal: 'SELL',
                strength: 0.74,
                confidence: 0.83,
                performance: {
                    sharpe_ratio: 1.92,
                    max_drawdown: -0.09,
                    win_rate: 0.68
                }
            },
            {
                name: 'VolatilityAdjusted',
                displayName: '波動率調整策略',
                description: '成交量加權的情緒分析',
                signal: 'HOLD',
                strength: 0.58,
                confidence: 0.75,
                performance: {
                    sharpe_ratio: 1.67,
                    max_drawdown: -0.06,
                    win_rate: 0.65
                }
            }
        ];

        function updateStatus(connected) {
            const indicator = document.getElementById('statusIndicator');
            const statusText = document.getElementById('statusText');

            if (connected) {
                indicator.className = 'status-indicator status-connected';
                statusText.textContent = '✅ WebSocket连接正常';
                statusText.style.color = '#52c41a';
            } else {
                indicator.className = 'status-indicator status-disconnected';
                statusText.textContent = '❌ WebSocket连接断开';
                statusText.style.color = '#ff4d4f';
            }
        }

        function renderStrategyCard(strategy) {
            const signalClass = strategy.signal === 'BUY' ? 'signal-buy' :
                              strategy.signal === 'SELL' ? 'signal-sell' : 'signal-hold';

            const signalText = strategy.signal === 'BUY' ? '📈 买入' :
                              strategy.signal === 'SELL' ? '📉 卖出' : '⏸️ 持有';

            return `
                <div class="strategy-card">
                    <div class="strategy-name">${strategy.displayName}</div>
                    <div style="color: #666; font-size: 0.9em; margin-bottom: 12px;">
                        ${strategy.description}
                    </div>
                    <div class="strategy-signal ${signalClass}">
                        ${signalText}
                    </div>
                    <div class="strategy-metrics">
                        <div class="metric">
                            <span>信号强度:</span>
                            <span class="metric-value">${(strategy.strength * 100).toFixed(0)}%</span>
                        </div>
                        <div class="metric">
                            <span>置信度:</span>
                            <span class="metric-value">${(strategy.confidence * 100).toFixed(0)}%</span>
                        </div>
                        <div class="metric">
                            <span>Sharpe比率:</span>
                            <span class="metric-value">${strategy.performance.sharpe_ratio.toFixed(2)}</span>
                        </div>
                        <div class="metric">
                            <span>最大回撤:</span>
                            <span class="metric-value">${(strategy.performance.max_drawdown * 100).toFixed(1)}%</span>
                        </div>
                        <div class="metric">
                            <span>胜率:</span>
                            <span class="metric-value">${(strategy.performance.win_rate * 100).toFixed(0)}%</span>
                        </div>
                    </div>
                </div>
            `;
        }

        function renderStrategies(strategies) {
            const grid = document.getElementById('strategyGrid');
            const loading = document.getElementById('loadingMessage');

            if (strategies && strategies.length > 0) {
                grid.innerHTML = strategies.map(strategy => renderStrategyCard(strategy)).join('');
                grid.style.display = 'grid';
                loading.style.display = 'none';
            } else {
                // 使用模拟数据
                grid.innerHTML = mockStrategies.map(strategy => renderStrategyCard(strategy)).join('');
                grid.style.display = 'grid';
                loading.style.display = 'none';
            }

            updateLastUpdateTime();
        }

        function updateLastUpdateTime() {
            const lastUpdate = document.getElementById('lastUpdate');
            const now = new Date();
            lastUpdate.textContent = `最后更新时间: ${now.toLocaleString('zh-CN')}`;
        }

        function connectWebSocket() {
            try {
                ws = new WebSocket('ws://localhost:3005/ws');

                ws.onopen = () => {
                    console.log('WebSocket连接成功');
                    updateStatus(true);
                    reconnectAttempts = 0;

                    // 隐藏加载消息，显示策略
                    document.getElementById('loadingMessage').style.display = 'none';
                };

                ws.onmessage = (event) => {
                    try {
                        const data = JSON.parse(event.data);
                        console.log('收到WebSocket数据:', data);

                        if (data.type === 'welcome') {
                            // 连接成功，显示模拟数据
                            renderStrategies(mockStrategies);
                        } else if (data.strategies) {
                            // 显示真实策略数据
                            renderStrategies(data.strategies);
                        }
                    } catch (e) {
                        console.error('解析WebSocket数据错误:', e);
                        // 显示模拟数据
                        renderStrategies(mockStrategies);
                    }
                };

                ws.onerror = (error) => {
                    console.error('WebSocket错误:', error);
                    updateStatus(false);
                    // 连接失败时也显示模拟数据
                    renderStrategies(mockStrategies);
                };

                ws.onclose = () => {
                    console.log('WebSocket连接关闭');
                    updateStatus(false);

                    // 尝试重连
                    if (reconnectAttempts < maxReconnectAttempts) {
                        reconnectAttempts++;
                        console.log(`尝试重连 (${reconnectAttempts}/${maxReconnectAttempts})...`);
                        setTimeout(connectWebSocket, 3000);
                    }
                };

            } catch (error) {
                console.error('WebSocket连接失败:', error);
                updateStatus(false);
                // WebSocket连接失败时显示模拟数据
                renderStrategies(mockStrategies);
            }
        }

        function reconnectWebSocket() {
            if (ws) {
                ws.close();
            }
            reconnectAttempts = 0;
            document.getElementById('loadingMessage').style.display = 'block';
            document.getElementById('strategyGrid').style.display = 'none';
            connectWebSocket();
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', () => {
            console.log('页面加载完成，初始化Dashboard...');

            // 立即显示模拟数据
            setTimeout(() => {
                renderStrategies(mockStrategies);
            }, 1000);

            // 尝试连接WebSocket
            connectWebSocket();
        });

        // 定期更新时间
        setInterval(updateLastUpdateTime, 60000); // 每分钟更新一次
    </script>
</body>
</html>
