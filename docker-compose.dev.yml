version: '3.8'

# Development Environment Docker Compose Configuration
# Optimized for CBSC Strategy Management System Development
#
# Services:
# - API Gateway (8000): Central entry point and routing
# - PostgreSQL (5432): Main database
# - Redis (6379): Caching and session management
# - Frontend (3000): React development server
# - Unified Dashboard (3001): Advanced dashboard
#
# Usage:
#   docker-compose -f docker-compose.dev.yml up -d
#   docker-compose -f docker-compose.dev.yml down
#   docker-compose -f docker-compose.dev.yml logs -f [service]

services:
  # PostgreSQL Database - Development Instance
  postgres:
    image: postgres:15-alpine
    container_name: cbsc-dev-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: cbsc_dev
      POSTGRES_USER: cbsc_dev
      POSTGRES_PASSWORD: cbsc_dev_password
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
      - ./database/dev/init:/docker-entrypoint-initdb.d
      - ./database/dev/postgres.conf:/etc/postgresql/postgresql.conf
    networks:
      - cbsc-dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbsc_dev -d cbsc_dev"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache - Development Instance
  redis:
    image: redis:7-alpine
    container_name: cbsc-dev-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
      - ./redis/dev/redis.conf:/usr/local/etc/redis/redis.conf
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - cbsc-dev-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # API Gateway - Development Instance
  api-gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile.dev
    container_name: cbsc-dev-api-gateway
    ports:
      - "8000:8000"
    environment:
      # Database Configuration
      - DATABASE_URL=postgresql://cbsc_dev:cbsc_dev_password@postgres:5432/cbsc_dev
      - REDIS_URL=redis://redis:6379

      # Gateway Configuration
      - GATEWAY_SECRET_KEY=dev_secret_key_change_in_production
      - GATEWAY_HOST=0.0.0.0
      - GATEWAY_PORT=8000

      # Service URLs (Internal Docker Network)
      - QUANT_SYSTEM_URL=http://quant-system:8001
      - USER_MANAGEMENT_URL=http://user-management:3004
      - STRATEGY_DASHBOARD_URL=http://strategy-dashboard:3003
      - CONFIG_SERVICE_URL=http://config-service:3005

      # External Service URLs (Local Development)
      - FRONTEND_URL=http://localhost:3000
      - UNIFIED_DASHBOARD_URL=http://localhost:3001

      # Development Configuration
      - LOG_LEVEL=DEBUG
      - ENVIRONMENT=development
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001,http://127.0.0.1:3000,http://127.0.0.1:3001
      - RATE_LIMIT_ENABLED=false
      - AUTH_ENABLED=true
      - JWT_SECRET=dev_jwt_secret_change_in_production

    volumes:
      - ./gateway:/app
      - gateway_dev_logs:/app/logs
      - ./gateway/config:/app/config
    networks:
      - cbsc-dev-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Backend Services (Optional - Start as needed)

  # User Management Service
  user-management:
    build:
      context: ./src/api
      dockerfile: Dockerfile.dev
    container_name: cbsc-dev-user-management
    ports:
      - "3004:3004"
    environment:
      - DATABASE_URL=postgresql://cbsc_dev:cbsc_dev_password@postgres:5432/cbsc_dev
      - REDIS_URL=redis://redis:6379
      - API_HOST=0.0.0.0
      - API_PORT=3004
      - LOG_LEVEL=DEBUG
      - JWT_SECRET=dev_jwt_secret_change_in_production
    volumes:
      - ./src/api:/app
      - user_management_dev_logs:/app/logs
    networks:
      - cbsc-dev-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - backend

  # Strategy Dashboard Service
  strategy-dashboard:
    build:
      context: ./src/dashboard
      dockerfile: Dockerfile.dev
    container_name: cbsc-dev-strategy-dashboard
    ports:
      - "3003:3003"
    environment:
      - DATABASE_URL=postgresql://cbsc_dev:cbsc_dev_password@postgres:5432/cbsc_dev
      - REDIS_URL=redis://redis:6379
      - API_HOST=0.0.0.0
      - API_PORT=3003
      - LOG_LEVEL=DEBUG
    volumes:
      - ./src/dashboard:/app
      - strategy_dashboard_dev_logs:/app/logs
    networks:
      - cbsc-dev-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - backend

  # Quant System Service
  quant-system:
    build:
      context: ./src/quant
      dockerfile: Dockerfile.dev
    container_name: cbsc-dev-quant-system
    ports:
      - "8001:8001"
    environment:
      - DATABASE_URL=postgresql://cbsc_dev:cbsc_dev_password@postgres:5432/cbsc_dev
      - REDIS_URL=redis://redis:6379
      - API_HOST=0.0.0.0
      - API_PORT=8001
      - LOG_LEVEL=DEBUG
    volumes:
      - ./src/quant:/app
      - quant_system_dev_logs:/app/logs
      - ./src/quant/models:/app/models
      - ./src/quant/data:/app/data
    networks:
      - cbsc-dev-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - backend

  # Configuration Service
  config-service:
    build:
      context: ./src/config
      dockerfile: Dockerfile.dev
    container_name: cbsc-dev-config-service
    ports:
      - "3005:3005"
    environment:
      - DATABASE_URL=postgresql://cbsc_dev:cbsc_dev_password@postgres:5432/cbsc_dev
      - REDIS_URL=redis://redis:6379
      - API_HOST=0.0.0.0
      - API_PORT=3005
      - LOG_LEVEL=DEBUG
      - CONFIG_PATH=/app/config
    volumes:
      - ./src/config:/app
      - config_service_dev_logs:/app/logs
      - ./config:/app/config
    networks:
      - cbsc-dev-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - backend

  # Frontend Applications

  # React Frontend - Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: cbsc-dev-frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_API_BASE_URL=http://localhost:8000/api
      - REACT_APP_WS_URL=ws://localhost:8000/ws
      - REACT_APP_ENV=development
      - REACT_APP_DEBUG=true
      - PORT=3000
      - CHOKIDAR_USEPOLLING=true
      - FAST_REFRESH=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - frontend_dev_logs:/app/logs
    networks:
      - cbsc-dev-network
    restart: unless-stopped
    depends_on:
      - api-gateway
    stdin_open: true
    tty: true

  # Unified Dashboard - Development Server
  unified-dashboard:
    build:
      context: ./unified-dashboard
      dockerfile: Dockerfile.dev
    container_name: cbsc-dev-unified-dashboard
    ports:
      - "3001:3001"
    environment:
      - API_BASE_URL=http://localhost:8000/api
      - WS_URL=ws://localhost:8000/ws
      - NODE_ENV=development
      - PORT=3001
      - VITE_DEV_SERVER_HOST=0.0.0.0
      - VITE_DEV_SERVER_PORT=3001
    volumes:
      - ./unified-dashboard:/app
      - /app/node_modules
      - unified_dashboard_dev_logs:/app/logs
    networks:
      - cbsc-dev-network
    restart: unless-stopped
    depends_on:
      - api-gateway
    stdin_open: true
    tty: true

  # Development Tools

  # Database Admin Tool
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cbsc-dev-pgadmin
    ports:
      - "5050:80"
    environment:
      - PGADMIN_DEFAULT_EMAIL=cbsc-dev@example.com
      - PGADMIN_DEFAULT_PASSWORD=cbsc_dev_admin
      - PGADMIN_CONFIG_SERVER_MODE=False
    volumes:
      - pgadmin_dev_data:/var/lib/pgadmin
      - ./database/dev/pgadmin-servers.json:/pgadmin4/servers.json
    networks:
      - cbsc-dev-network
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - tools

  # Redis Admin Tool
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: cbsc-dev-redis-commander
    ports:
      - "8081:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    networks:
      - cbsc-dev-network
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - tools

# Named Volumes for Development Data Persistence
volumes:
  postgres_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  gateway_dev_logs:
    driver: local
  user_management_dev_logs:
    driver: local
  strategy_dashboard_dev_logs:
    driver: local
  quant_system_dev_logs:
    driver: local
  config_service_dev_logs:
    driver: local
  frontend_dev_logs:
    driver: local
  unified_dashboard_dev_logs:
    driver: local
  pgadmin_dev_data:
    driver: local

# Development Network Configuration
networks:
  cbsc-dev-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1