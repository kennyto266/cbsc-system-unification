# Redis 配置文件 - 生產環境

# 網絡設置
bind 0.0.0.0
port 6379
protected-mode yes
requirepass CHANGE_THIS_STRONG_REDIS_PASSWORD

# 通用設置
daemonize no
pidfile /var/run/redis_6379.pid
loglevel notice
logfile ""

# 記憶體設置
maxmemory 512mb
maxmemory-policy allkeys-lru

# 持久化設置
save 900 1
save 300 10
save 60 10000
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF 設置
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 安全設置
# requirepass 在上面已設置

# 客戶端設置
timeout 300
tcp-keepalive 300
tcp-backlog 511