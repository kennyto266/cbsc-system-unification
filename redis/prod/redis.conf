# Redis Production Configuration
# Optimized for performance and security

# Network
bind 0.0.0.0
port 6379
protected-mode yes
requirepass ${REDIS_PASSWORD}

# General
daemonize yes
pidfile /var/run/redis_6379.pid
loglevel notice
logfile /var/log/redis/redis-server.log
syslog-enabled yes
syslog-ident redis

# Databases
databases 16

# Memory management (production-optimized)
maxmemory 2gb
maxmemory-policy allkeys-lru

# Persistence (production-grade settings)
save 900 1
save 300 10
save 60 10000

# RDB settings
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data
rdb-del-sync-files no

# AOF settings (production-critical)
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes
aof-use-rdb-preamble yes

# Slow log (production-appropriate)
slowlog-log-slower-than 100000
slowlog-max-len 1024

# Client settings
timeout 300
tcp-keepalive 300
tcp-backlog 511

# Production optimizations
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000
stream-node-max-bytes 4096
stream-node-max-entries 100

# Active rehashing
activerehashing yes

# Client output buffer limits
client-output-buffer-limit normal 0 0 0
client-output-buffer-limit replica 256mb 64mb 60
client-output-buffer-limit pubsub 32mb 8mb 60

# Query buffer limits
client-query-buffer-limit 1gb

# Protocol max bulk request size
proto-max-bulk-len 512mb

# Limits
maxclients 10000

# Memory usage optimizations
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no
lazyfree-lazy-user-del no
lazyfree-lazy-user-flush no

# AOF rewrite
aof-rewrite-incremental-fsync yes

# Lua scripting
lua-time-limit 5000

# Notify keyspace events (minimal in production)
notify-keyspace-events ""

# Replication settings
replica-serve-stale-data yes
replica-read-only yes
repl-diskless-sync no
repl-diskless-sync-delay 5
repl-ping-replica-period 10
repl-timeout 60
repl-disable-tcp-nodelay no
repl-backlog-size 1mb
repl-backlog-ttl 3600

# Security
rename-command FLUSHDB ""
rename-command FLUSHALL ""
rename-command KEYS ""
rename-command DEBUG ""
rename-command CONFIG ""
rename-command SHUTDOWN REDIS_SHUTDOWN
rename-command EVAL ""

# TLS (if enabled)
# tls-port 6380
# tls-cert-file /path/to/redis.crt
# tls-key-file /path/to/redis.key
# tls-ca-cert-file /path/to/ca.crt

# Modules (if using Redis modules)
# loadmodule /path/to/redisearch.so
# loadmodule /path/to/redisjson.so
# loadmodule /path/to/redistimeseries.so

# Cluster (if using Redis Cluster)
# cluster-enabled yes
# cluster-config-file nodes-6379.conf
# cluster-node-timeout 15000
# cluster-announce-ip 10.0.0.1
# cluster-announce-port 6379
# cluster-announce-bus-port 16379

# Other production settings
databases 16
always-show-logo yes
supervised systemd