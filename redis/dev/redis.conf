# Redis Development Configuration
# Optimized for development with verbose logging

# Network
bind 0.0.0.0
port 6379
protected-mode no

# General
daemonize no
pidfile /var/run/redis_6379.pid
loglevel debug
logfile ""

# Databases
databases 16

# Memory management (conservative for development)
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence (enabled but with longer intervals for development)
save 900 1
save 300 10
save 60 10000

# RDB settings
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir /data

# AOF settings
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb
aof-load-truncated yes

# Slow log (very verbose for development)
slowlog-log-slower-than 10000
slowlog-max-len 128

# Client settings
timeout 300
tcp-keepalive 60
tcp-backlog 511

# Development optimizations
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
list-compress-depth 0
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64
hll-sparse-max-bytes 3000

# Active rehashing
activerehashing yes

# Limits
maxclients 10000

# Memory usage
lazyfree-lazy-eviction no
lazyfree-lazy-expire no
lazyfree-lazy-server-del no
replica-lazy-flush no

# AOF rewrite
aof-rewrite-incremental-fsync yes

# Lua scripting
lua-time-limit 5000

# Notify keyspace events (useful for development)
notify-keyspace-events "Ex"

# Cluster (disabled in development)
# cluster-enabled no
# cluster-config-file nodes-6379.conf
# cluster-node-timeout 15000

# Other
databases 16
always-show-logo yes