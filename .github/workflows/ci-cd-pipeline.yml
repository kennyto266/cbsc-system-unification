name: CI/CD Pipeline - CBS-C Strategy Management System

on:
  push:
    branches: [ main, develop, 'feature/*', 'hotfix/*' ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'dev'
        type: choice
        options:
        - dev
        - test
        - staging
        - prod
      force_deploy:
        description: 'Force deployment (skip tests)'
        required: false
        default: false
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '18'

jobs:
  # Code Quality and Security Checks
  code-quality:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        pip install pre-commit

    - name: Run pre-commit hooks
      run: |
        pre-commit run --all-files

    - name: Run security scan with Bandit
      run: |
        bandit -r src/ -f json -o bandit-report.json || true

    - name: Run dependency security scan
      run: |
        pip-audit --format=json --output=audit-report.json || true

    - name: Upload security reports
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: security-reports
        path: |
          bandit-report.json
          audit-report.json

  # Backend Tests
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: code-quality

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: testpassword
          POSTGRES_USER: testuser
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov pytest-mock pytest-asyncio

    - name: Run unit tests
      env:
        DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
        REDIS_URL: redis://localhost:6379/0
        TESTING: true
      run: |
        pytest tests/unit/ -v --cov=src --cov-report=xml --cov-report=html

    - name: Run integration tests
      env:
        DATABASE_URL: postgresql://testuser:testpassword@localhost:5432/testdb
        REDIS_URL: redis://localhost:6379/0
        TESTING: true
      run: |
        pytest tests/integration/ -v --cov=src --cov-report=xml --cov-append

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: backend
        name: backend-coverage

  # Frontend Tests
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Install dependencies
      working-directory: ./frontend
      run: |
        npm ci

    - name: Run linting
      working-directory: ./frontend
      run: |
        npm run lint

    - name: Run type checking
      working-directory: ./frontend
      run: |
        npm run type-check

    - name: Run unit tests
      working-directory: ./frontend
      run: |
        npm run test:unit -- --coverage --watchAll=false

    - name: Run E2E tests
      working-directory: ./frontend
      run: |
        npm run test:e2e:ci

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./frontend/coverage/lcov.info
        flags: frontend
        name: frontend-coverage

  # Build and Push Docker Images
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    if: github.event_name != 'pull_request'

    strategy:
      matrix:
        service: [backend, frontend, nginx]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ github.repository }}/${{ matrix.service }}
        tags: |
          type=ref,event=branch
          type=ref,event=pr
          type=semver,pattern={{version}}
          type=semver,pattern={{major}}.{{minor}}
          type=semver,pattern={{major}}
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and push Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./docker/Dockerfile.${{ matrix.service }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

  # Deploy to Development
  deploy-dev:
    name: Deploy to Development
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/develop'
    environment: development

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name cbsc-dev-cluster

    - name: Deploy to Kubernetes
      run: |
        # Update image tags in deployment files
        sed -i 's|image: cbsc/strategy-api:latest|image: ${{ env.REGISTRY }}/${{ github.repository }}/backend:develop-${{ github.sha }}|' k8s/deployments/backend-deployment.yaml
        sed -i 's|image: cbsc/frontend:latest|image: ${{ env.REGISTRY }}/${{ github.repository }}/frontend:develop-${{ github.sha }}|' k8s/deployments/backend-deployment.yaml
        sed -i 's|image: nginx:alpine|image: ${{ env.REGISTRY }}/${{ github.repository }}/nginx:develop-${{ github.sha }}|' k8s/deployments/backend-deployment.yaml

        # Apply Kubernetes manifests
        kubectl apply -f k8s/namespaces/
        kubectl apply -f k8s/secrets/
        kubectl apply -f k8s/configmaps/
        kubectl apply -f k8s/pvc/
        kubectl apply -f k8s/deployments/
        kubectl apply -f k8s/services/

        # Wait for rollout
        kubectl rollout status deployment/backend -n cbsc-system --timeout=300s
        kubectl rollout status deployment/frontend -n cbsc-system --timeout=300s
        kubectl rollout status deployment/nginx -n cbsc-system --timeout=300s

  # Deploy to Staging
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    environment: staging

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name cbsc-staging-cluster

    - name: Run smoke tests
      run: |
        # Deploy to a temporary namespace for smoke testing
        kubectl create namespace cbsc-smoke-test --dry-run=client -o yaml | kubectl apply -f -

        # Deploy with smoke test configuration
        helm upgrade --install cbsc-smoke-test ./helm/cbsc-strategy-management \
          --namespace cbsc-smoke-test \
          --set image.tag=main-${{ github.sha }} \
          --set environment=staging \
          --wait --timeout=10m

    - name: Run integration tests on staging
      run: |
        # Run automated integration tests
        pytest tests/e2e/ -v --base-url=https://staging-api.cbsc.example.com

    - name: Cleanup smoke test
      if: always()
      run: |
        helm uninstall cbsc-smoke-test -n cbsc-smoke-test
        kubectl delete namespace cbsc-smoke-test

  # Deploy to Production
  deploy-prod:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: startsWith(github.ref, 'refs/tags/v')
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: us-east-1

    - name: Update kubeconfig
      run: |
        aws eks update-kubeconfig --name cbsc-prod-cluster

    - name: Create backup
      run: |
        # Create database backup before deployment
        kubectl exec -n cbsc-system deployment/postgres -- pg_dump -U cbsc_user cbsc_strategy | gzip > backup-$(date +%Y%m%d-%H%M%S).sql.gz

        # Upload backup to S3
        aws s3 cp backup-$(date +%Y%m%d-%H%M%S).sql.gz s3://cbsc-backups/prod/

    - name: Deploy to production with Helm
      run: |
        # Get version from tag
        VERSION=${GITHUB_REF#refs/tags/}

        # Deploy using Helm for better control
        helm upgrade --install cbsc-prod ./helm/cbsc-strategy-management \
          --namespace cbsc-system \
          --set image.tag=$VERSION \
          --set environment=production \
          --set replicaCount.backend=5 \
          --set replicaCount.frontend=3 \
          --set resources.requests.memory=4Gi \
          --set resources.requests.cpu=2000m \
          --wait --timeout=15m

    - name: Run post-deployment health checks
      run: |
        # Wait for all pods to be ready
        kubectl wait --for=condition=ready pod -l app=cbsc-backend -n cbsc-system --timeout=600s
        kubectl wait --for=condition=ready pod -l app=cbsc-frontend -n cbsc-system --timeout=600s

        # Check application health endpoints
        kubectl exec -n cbsc-system deployment/backend -- curl -f http://localhost:8000/health
        kubectl exec -n cbsc-system deployment/frontend -- curl -f http://localhost/

    - name: Notify Slack
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # Performance Testing
  performance-tests:
    name: Performance Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install k6
      run: |
        sudo gpg -k
        sudo gpg --no-default-keyring --keyring /usr/share/keyrings/k6-archive-keyring.gpg --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
        echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
        sudo apt-get update
        sudo apt-get install k6

    - name: Run load tests
      run: |
        k6 run --out json=results.json tests/performance/load-test.js

    - name: Run stress tests
      run: |
        k6 run --out json=stress-results.json tests/performance/stress-test.js

    - name: Upload performance reports
      uses: actions/upload-artifact@v3
      with:
        name: performance-reports
        path: |
          results.json
          stress-results.json

  # Security Scanning of Container Images
  container-security-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')

    steps:
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: ${{ env.REGISTRY }}/${{ github.repository }}/backend@${{ needs.build-and-push.outputs.digest }}
        format: 'sarif'
        output: 'trivy-results.sarif'

    - name: Upload Trivy scan results to GitHub Security tab
      uses: github/codeql-action/upload-sarif@v2
      if: always()
      with:
        sarif_file: 'trivy-results.sarif'