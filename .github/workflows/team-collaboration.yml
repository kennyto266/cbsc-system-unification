name: Team Collaboration Rules

on:
  pull_request:
    branches: [ main, master, epic/* ]
  push:
    branches: [ main, master ]

jobs:
  check-branch-naming:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Check branch naming convention
      run: |
        BRANCH_NAME="${{ github.head_ref }}"
        echo "Checking branch: $BRANCH_NAME"
        
        # Allow specific patterns
        if [[ "$BRANCH_NAME" =~ ^(feature|fix|hotfix|epic|docs|test|refactor)/.+$ ]]; then
          echo "✅ Branch name follows convention"
        else
          echo "❌ Branch name should follow convention: (feature|fix|hotfix|epic|docs|test|refactor)/description"
          exit 1
        fi

  pr-validation:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - name: Check PR template
      run: |
        echo "PR Description:"
        echo "${{ github.event.pull_request.body }}"
        
        # Check if PR has description
        if [ -z "${{ github.event.pull_request.body }}" ]; then
          echo "❌ PR must have a description"
          exit 1
        fi
        
        echo "✅ PR has description"

  required-checks:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
    - uses: actions/checkout@v3
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    - name: Check if tests pass (placeholder)
      run: |
        echo "🔍 Running team collaboration checks..."
        echo "✅ Basic validation passed"
        # Add actual test commands here