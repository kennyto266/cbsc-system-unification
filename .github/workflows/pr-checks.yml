name: Pull Request Checks

on:
  pull_request:
    branches: [ main, epic/* ]
    types: [opened, synchronize, reopened]

env:
  NODE_VERSION: '18'
  PYTHON_VERSION: '3.11'

jobs:
  # PR Information
  pr-info:
    name: PR Information
    runs-on: ubuntu-latest
    outputs:
      is-draft: ${{ steps.info.outputs.is-draft }}
      base-branch: ${{ steps.info.outputs.base-branch }}
      head-branch: ${{ steps.info.outputs.head-branch }}
      changed-files: ${{ steps.changes.outputs.changed-files }}
      frontend-changed: ${{ steps.changes.outputs.frontend }}
      backend-changed: ${{ steps.changes.outputs.backend }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get PR information
        id: info
        run: |
          if [ "${{ github.event.pull_request.draft }}" == "true" ]; then
            echo "is-draft=true" >> $GITHUB_OUTPUT
          else
            echo "is-draft=false" >> $GITHUB_OUTPUT
          fi
          echo "base-branch=${{ github.event.pull_request.base.ref }}" >> $GITHUB_OUTPUT
          echo "head-branch=${{ github.event.pull_request.head.ref }}" >> $GITHUB_OUTPUT

      - name: Get changed files
        id: changes
        run: |
          # Get all changed files
          changed_files=$(git diff --name-only origin/${{ github.event.pull_request.base.ref }}...HEAD)
          echo "changed-files<<EOF" >> $GITHUB_OUTPUT
          echo "$changed_files" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          # Check if frontend files changed
          if echo "$changed_files" | grep -E "^frontend/|^.*\.(tsx?|jsx?|json)$" > /dev/null; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          else
            echo "frontend=false" >> $GITHUB_OUTPUT
          fi

          # Check if backend files changed
          if echo "$changed_files" | grep -E "^src/|^.*\.(py)$" > /dev/null; then
            echo "backend=true" >> $GITHUB_OUTPUT
          else
            echo "backend=false" >> $GITHUB_OUTPUT
          fi

  # Code Quality Gates
  quality-gates:
    name: Code Quality Gates
    runs-on: ubuntu-latest
    needs: pr-info
    if: needs.pr-info.outputs.is-draft == 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        if: needs.pr-info.outputs.frontend-changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        if: needs.pr-info.outputs.backend-changed == 'true'
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install frontend dependencies
        if: needs.pr-info.outputs.frontend-changed == 'true'
        working-directory: ./frontend
        run: npm ci

      - name: Install backend dependencies
        if: needs.pr-info.outputs.backend-changed == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run frontend linting
        if: needs.pr-info.outputs.frontend-changed == 'true'
        working-directory: ./frontend
        run: |
          npm run lint
          npm run type-check

      - name: Run backend linting
        if: needs.pr-info.outputs.backend-changed == 'true'
        run: |
          # Run linting with coverage
          flake8 src/ \
            --format=json \
            --output-file=flake8-report.json \
            --max-line-length=120 \
            --ignore=E203,W503 \
            --exclude=__pycache__,.git,.venv,.tox,dist,build,*.egg

          # Check code formatting
          black --check --diff src/ > black-diff.txt 2>&1 || true

          # Check import sorting
          isort --check-only --diff src/ > isort-diff.txt 2>&1 || true

          # Type checking
          mypy src/ \
            --ignore-missing-imports \
            --json-report mypy-report || true

      - name: Upload quality reports
        if: always() && (needs.pr-info.outputs.frontend-changed == 'true' || needs.pr-info.outputs.backend-changed == 'true')
        uses: actions/upload-artifact@v3
        with:
          name: quality-reports
          path: |
            flake8-report.json
            black-diff.txt
            isort-diff.txt
            mypy-report/
          retention-days: 7

  # Security Scan
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: pr-info
    if: needs.pr-info.outputs.is-draft == 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v2
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Secret detection
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: main
          head: HEAD
          extra_args: --debug --only-verified

      - name: Run CodeQL Analysis
        uses: github/codeql-action/init@v2
        with:
          languages: javascript, python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v2

  # Frontend Tests
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    needs: [pr-info, quality-gates]
    if: needs.pr-info.outputs.frontend-changed == 'true'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: ./frontend
        run: npm run test:coverage

      - name: Run integration tests
        working-directory: ./frontend
        run: npm run test:integration

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

  # Backend Tests
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    needs: [pr-info, quality-gates]
    if: needs.pr-info.outputs.backend-changed == 'true'
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_cbsc
          POSTGRES_USER: test_user
        options: >-
          --health-cmd pg_isready -U test_user -d test_cbsc
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: |
            requirements.txt
            requirements-test.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run database migrations
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_cbsc
          REDIS_URL: redis://localhost:6379/0
        run: |
          alembic upgrade head

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_cbsc
          REDIS_URL: redis://localhost:6379/0
          TESTING: true
        run: |
          pytest tests/unit/ \
            -v \
            --cov=src \
            --cov-report=xml \
            --cov-report=html \
            --cov-fail-under=80 \
            --junitxml=unit-test-results.xml

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://test_user:test_password@localhost:5432/test_cbsc
          REDIS_URL: redis://localhost:6379/0
          TESTING: true
        run: |
          pytest tests/integration/ \
            -v \
            --cov=src \
            --cov-append \
            --cov-report=xml \
            --junitxml=integration-test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: backend-test-results
          path: |
            unit-test-results.xml
            integration-test-results.xml
            htmlcov/
          retention-days: 7

  # Build Verification
  build-verification:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: [pr-info, frontend-tests, backend-tests]
    if: needs.pr-info.outputs.is-draft == 'false'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image
        if: needs.pr-info.outputs.frontend-changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: false
          load: true
          tags: cbsc-frontend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build backend Docker image
        if: needs.pr-info.outputs.backend-changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./src/api
          file: ./src/api/Dockerfile
          push: false
          load: true
          tags: cbsc-backend:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Performance Impact Assessment
  performance-check:
    name: Performance Impact Assessment
    runs-on: ubuntu-latest
    needs: [pr-info]
    if: |
      needs.pr-info.outputs.is-draft == 'false' &&
      (needs.pr-info.outputs.frontend-changed == 'true' || needs.pr-info.outputs.backend-changed == 'true')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Analyze performance impact
        run: |
          # Check for potential performance regressions
          echo "Analyzing potential performance impact..."

          # Check for N+1 query patterns
          if grep -r "for.*in.*:" src/ --include="*.py" | grep -E "\.filter\(|\.all\(" > /dev/null; then
            echo "⚠️ Warning: Potential N+1 query pattern detected"
            exit 1
          fi

          # Check for missing indexes hints
          if grep -r "ForeignKey" src/ --include="*.py" | grep -v "db_index=True" > /dev/null; then
            echo "⚠️ Warning: ForeignKey without db_index=True detected"
          fi

          echo "✅ Performance check completed"

  # PR Status Check
  status-check:
    name: PR Status Check
    runs-on: ubuntu-latest
    needs: [quality-gates, security-scan, frontend-tests, backend-tests, build-verification, performance-check]
    if: always()
    steps:
      - name: Check all jobs status
        run: |
          if [[ "${{ needs.quality-gates.result }}" != "success" ]]; then
            echo "❌ Quality gates failed"
            exit 1
          fi

          if [[ "${{ needs.security-scan.result }}" != "success" ]]; then
            echo "❌ Security scan failed"
            exit 1
          fi

          if [[ "${{ needs.frontend-tests.result }}" == "failure" ]]; then
            echo "❌ Frontend tests failed"
            exit 1
          fi

          if [[ "${{ needs.backend-tests.result }}" == "failure" ]]; then
            echo "❌ Backend tests failed"
            exit 1
          fi

          if [[ "${{ needs.build-verification.result }}" == "failure" ]]; then
            echo "❌ Build verification failed"
            exit 1
          fi

          if [[ "${{ needs.performance-check.result }}" == "failure" ]]; then
            echo "❌ Performance check failed"
            exit 1
          fi

          echo "✅ All checks passed successfully"