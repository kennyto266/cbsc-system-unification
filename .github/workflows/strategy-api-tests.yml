name: Strategy API Tests

on:
  push:
    branches: [ main, feature/*, develop ]
    paths:
      - 'src/api/strategies/**'
      - 'migrations/**'
      - 'requirements.txt'
      - 'pytest.strategies.ini'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/api/strategies/**'
      - 'migrations/**'
      - 'requirements.txt'
      - 'pytest.strategies.ini'

env:
  PYTHON_VERSION: "3.9"
  NODE_VERSION: "16"

jobs:
  # Python 測試
  test-python:
    name: Python Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:6-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip packages
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-asyncio pytest-cov pytest-mock pytest-xdist

      - name: Run unit tests
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest src/api/strategies/tests/test_services.py \
            -m "unit and not slow" \
            -v \
            --cov=src/api/strategies \
            --cov-report=xml \
            --junitxml=test-results-unit.xml

      - name: Run integration tests
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
        run: |
          pytest src/api/strategies/tests/ \
            -m "integration and not slow" \
            -v \
            --cov=src/api/strategies \
            --cov-append \
            --cov-report=xml \
            --junitxml=test-results-integration.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Publish test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-python
          path: |
            test-results-*.xml
            htmlcov/
          retention-days: 7

  # API 測試
  test-api:
    name: API Tests
    runs-on: ubuntu-latest
    needs: test-python

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432

      redis:
        image: redis:6-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install aiohttp pytest-asyncio

      - name: Start API server
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/testdb
          REDIS_URL: redis://localhost:6379/0
        run: |
          python -m uvicorn src.api.main:app --host 0.0.0.0 --port 8000 &
          sleep 10

      - name: Run API tests
        run: |
          python src/api/strategies/tests/api_test_suite.py

      - name: Upload API test results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: test-results-api
          path: api_test_report.md
          retention-days: 7

  # 性能測試
  test-performance:
    name: Performance Tests
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'pull_request'
    needs: test-python

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest-benchmark

      - name: Run performance tests
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/testdb
        run: |
          pytest src/api/strategies/tests/ \
            -m "performance" \
            --benchmark-only \
            --benchmark-json=benchmark.json

      - name: Upload benchmark results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: benchmark-results
          path: benchmark.json
          retention-days: 30

  # WebSocket 測試
  test-websocket:
    name: WebSocket Tests
    runs-on: ubuntu-latest
    needs: test-python

    services:
      postgres:
        image: postgres:13
        env:
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install websockets pytest-asyncio

      - name: Run WebSocket tests
        env:
          DATABASE_URL: postgresql://postgres:testpass@localhost:5432/testdb
        run: |
          pytest src/api/strategies/tests/ \
            -m "websocket" \
            -v

  # 安全掃描
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run security scan
        run: |
          bandit -r src/api/strategies/ -f json -o security-report.json

      - name: Upload security report
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: security-report
          path: security-report.json
          retention-days: 30

  # 代碼質量檢查
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black isort mypy

      - name: Run flake8
        run: |
          flake8 src/api/strategies/ --output-file=flake8-report.txt || true

      - name: Run black
        run: |
          black --check src/api/strategies/ || true

      - name: Run isort
        run: |
          isort --check-only src/api/strategies/ || true

      - name: Run mypy
        run: |
          mypy src/api/strategies/ --ignore-missing-imports || true

      - name: Upload quality reports
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: code-quality-reports
          path: |
            flake8-report.txt
          retention-days: 7

  # 綜合測試報告
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-python, test-api, test-performance, test-websocket]
    if: always()

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts/

      - name: Create test summary
        run: |
          echo "# 測試摘要報告" > test-summary.md
          echo "" >> test-summary.md
          echo "## 測試結果" >> test-summary.md
          echo "" >> test-summary.md

          # 添加各個測試的結果
          for dir in artifacts/*; do
            if [ -d "$dir" ]; then
              echo "### $(basename $dir)" >> test-summary.md
              echo "- 狀態: 成功" >> test-summary.md
              echo "" >> test-summary.md
            fi
          done

      - name: Upload summary
        uses: actions/upload-artifact@v3
        with:
          name: test-summary
          path: test-summary.md
          retention-days: 7