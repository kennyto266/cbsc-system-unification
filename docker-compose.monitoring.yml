version: '3.8'

services:
  # CBSC Strategy API (with monitoring)
  cbsc-strategy-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbsc-strategy-api
    ports:
      - "3004:3004"
    environment:
      - DATABASE_URL=postgresql://cbsc_admin:cKelI4TJVKQ5pgCVKHYMY7GUZqqQsHvELoQBTJg-u8IPw!@postgres:5432/cbsc_production
      - POSTGRES_DB=cbsc_production
      - POSTGRES_USER=cbsc_admin
      - POSTGRES_PASSWORD=cKelI4TJVKQ5pgCVKHYMY7GUZqqQsHvELoQBTJg-u8IPw!
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CACHE_TTL=3600
      - JWT_SECRET_KEY=your-super-secret-jwt-key-change-in-production
      - API_RATE_LIMIT=100/minute
      - ENVIRONMENT=production
      - MONITORING_ENABLED=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cbsc-monitoring

  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: cbsc-postgres
    environment:
      POSTGRES_DB: cbsc_production
      POSTGRES_USER: cbsc_admin
      POSTGRES_PASSWORD: cKelI4TJVKQ5pgCVKHYMY7GUZqqQsHvELoQBTJg-u8IPw!
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbsc_admin -d cbsc_production"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cbsc-monitoring

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: cbsc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cbsc-monitoring

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: cbsc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/cbsc-api-metrics.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/cbsc-api-alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    restart: unless-stopped
    depends_on:
      - cbsc-strategy-api
    networks:
      - cbsc-monitoring

  # Alertmanager告警管理
  alertmanager:
    image: prom/alertmanager:latest
    container_name: cbsc-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    restart: unless-stopped
    networks:
      - cbsc-monitoring

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: cbsc-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-clock-panel,grafana-simple-json-datasource
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - cbsc-monitoring

  # Node Exporter (系统监控)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: cbsc-node-exporter
    ports:
      - "9100:9100"
    command:
      - '--path.rootfs=/host'
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped
    networks:
      - cbsc-monitoring

  # Postgres Exporter (数据库监控)
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: cbsc-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://cbsc_admin:cKelI4TJVKQ5pgCVKHYMY7GUZqqQsHvELoQBTJg-u8IPw!@postgres:5432/cbsc_production?sslmode=disable
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - cbsc-monitoring

  # Redis Exporter (Redis监控)
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: cbsc-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://redis:6379
    depends_on:
      - redis
    restart: unless-stopped
    networks:
      - cbsc-monitoring

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: cbsc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - cbsc-strategy-api
    restart: unless-stopped
    networks:
      - cbsc-monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  alertmanager_data:
    driver: local
  grafana_data:
    driver: local

networks:
  cbsc-monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/16