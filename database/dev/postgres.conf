# PostgreSQL Development Configuration
# Optimized for development with debugging enabled

# Connection Settings
listen_addresses = '*'
port = 5432
max_connections = 200

# Memory Settings (Conservative for development)
shared_buffers = 128MB
effective_cache_size = 512MB
work_mem = 4MB
maintenance_work_mem = 64MB

# Checkpoint Settings (More frequent for development)
checkpoint_completion_target = 0.9
wal_buffers = 16MB
default_statistics_target = 100

# Logging Settings (Verbose for development)
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_statement = 'all'
log_min_duration_statement = 0
log_checkpoints = on
log_connections = on
log_disconnections = on
log_lock_waits = on

# Development-specific settings
search_path = '"$user", public'
default_text_search_config = 'pg_catalog.english'

# Performance settings for development
random_page_cost = 1.1
effective_io_concurrency = 200

# Autovacuum (More aggressive for development)
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s

#_timezone settings
timezone = 'UTC'
log_timezone = 'UTC'