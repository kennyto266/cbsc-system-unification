# CBSC 策略管理系統 - Logstash 配置
# Logstash pipeline configuration for CBSC Strategy Management System

input {
  # Input from CBSC application logs
  beats {
    port => 5044
    host => "0.0.0.0"
  }

  # Input from Docker containers
  tcp {
    port => 5000
    codec => json_lines
  }

  # Input from application directly
  udp {
    port => 5001
    codec => json
  }

  # Input from syslog
  syslog {
    port => 5140
    host => "0.0.0.0"
    codec => plain {
      charset => "UTF-8"
    }
  }
}

filter {
  # Add environment and service information
  mutate {
    add_field => { "[@metadata][environment]" => "production" }
    add_field => { "[@metadata][application]" => "cbsc-strategy" }
    add_field => { "[@metadata][version]" => "2.0.0" }
  }

  # Parse JSON logs
  if [message] {
    json {
      source => "message"
      target => "parsed"
      skip_on_invalid_json => true
    }

    # If parsing successful, move fields to root
    if [parsed] {
      mutate {
        rename => {
          "[parsed][timestamp]" => "@timestamp"
          "[parsed][level]" => "level"
          "[parsed][message]" => "message"
          "[parsed][service]" => "service"
          "[parsed][component]" => "component"
          "[parsed][request_id]" => "request_id"
          "[parsed][user_id]" => "user_id"
          "[parsed][session_id]" => "session_id"
          "[parsed][duration_ms]" => "duration_ms"
          "[parsed][status_code]" => "status_code"
          "[parsed][error]" => "error"
          "[parsed][stack_trace]" => "stack_trace"
        }
      }
    }
  }

  # Set timestamp if not present
  if ![@timestamp] {
    mutate {
      add_field => { "@timestamp" => "%{+YYYY-MM-dd'T'HH:mm:ss.SSSZ}" }
    }
  }

  # Parse log levels
  if [level] {
    mutate {
      uppercase => [ "level" ]
    }
  } else {
    # Default level if not specified
    mutate {
      add_field => { "level" => "INFO" }
    }
  }

  # Add geoip information for IP addresses
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # Parse user agent if present
  if [user_agent] {
    useragent {
      source => "user_agent"
      target => "ua"
    }
  }

  # Extract request information
  if [request] {
    grok {
      match => { "request" => "%{WORD:http_method} %{URIPATH:uri_path}(?:%{URIPARAM:uri_params})? HTTP/%{NUMBER:http_version}" }
      tag_on_failure => ["_grokparsefailure_request"]
    }

    if [uri_params] {
      kv {
        source => "uri_params"
        field_split => "&"
        include_keys => ["strategy_id", "user_id", "start_date", "end_date"]
      }
    }
  }

  # Parse strategy execution logs
  if [service] == "strategy_execution" {
    grok {
      match => { "message" => "Strategy %{WORD:strategy_id} execution %{WORD:status} in %{NUMBER:duration_ms:float}ms" }
      tag_on_failure => ["_grokparsefailure_strategy"]
    }

    if [strategy_id] and [status] {
      mutate {
        add_field => { "event_type" => "strategy_execution" }
      }
    }
  }

  # Parse market data logs
  if [service] == "market_data" {
    grok {
      match => { "message" => "Market data for %{WORD:symbol}: price=%{NUMBER:price:float}, volume=%{NUMBER:volume:float}" }
      tag_on_failure => ["_grokparsefailure_market"]
    }

    if [symbol] {
      mutate {
        add_field => { "event_type" => "market_data_update" }
      }
    }
  }

  # Parse error logs
  if [level] == "ERROR" or [level] == "FATAL" {
    mutate {
      add_field => { "alert_type" => "error" }
      add_field => { "priority" => "high" }
    }

    # Extract stack trace if present
    if [stack_trace] {
      mutate {
        gsub => [ "stack_trace", "\n", " \\n " ]
      }
    }
  }

  # Parse performance logs
  if [duration_ms] {
    if [duration_ms] > 5000 {
      mutate {
        add_field => { "alert_type" => "performance" }
        add_field => { "priority" => "medium" }
      }
    }
  }

  # Add index information based on date
  mutate {
    add_field => { "[@metadata][index_prefix]" => "cbsc-logs" }
  }

  # Clean up fields
  mutate {
    remove_field => [ "parsed", "host", "agent" ]
    convert => {
      "duration_ms" => "integer"
      "status_code" => "integer"
    }
  }
}

output {
  # Output to Elasticsearch with daily indices
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "%{[@metadata][index_prefix]}-%{+YYYY.MM.dd}"
    template_name => "cbsc-logs"
    template_pattern => "cbsc-logs-*"
    template => {
      "index_patterns" => ["cbsc-logs-*"],
      "settings" => {
        "number_of_shards" => 1,
        "number_of_replicas" => 0,
        "index.lifecycle.name" => "cbsc-logs-policy",
        "index.lifecycle.rollover_alias" => "cbsc-logs"
      },
      "mappings" => {
        "properties" => {
          "@timestamp" => { "type" => "date" },
          "level" => { "type" => "keyword" },
          "service" => { "type" => "keyword" },
          "component" => { "type" => "keyword" },
          "message" => { "type" => "text" },
          "request_id" => { "type" => "keyword" },
          "user_id" => { "type" => "keyword" },
          "session_id" => { "type" => "keyword" },
          "duration_ms" => { "type" => "integer" },
          "status_code" => { "type" => "integer" },
          "error" => { "type" => "text" },
          "stack_trace" => { "type" => "text" },
          "client_ip" => { "type" => "ip" },
          "geoip" => { "type" => "geo_point" },
          "event_type" => { "type" => "keyword" },
          "alert_type" => { "type" => "keyword" },
          "priority" => { "type" => "keyword" }
        }
      }
    }
  }

  # Output errors to stderr for debugging
  if "_grokparsefailure" in [tags] or "_jsonparsefailure" in [tags] {
    stderr {
      codec => rubydebug
    }
  }
}