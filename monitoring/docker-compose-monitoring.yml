# CBSC系統監控棧 Docker Compose 配置
# 包含 Prometheus, Grafana, AlertManager, Node Exporter 等監控組件

version: '3.8'

services:
  # Prometheus - 時序數據庫和監控系統
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: cbsc-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus_config.yml:/etc/prometheus/prometheus.yml:ro
      - ./alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - ./recording_rules.yml:/etc/prometheus/recording_rules.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'
    networks:
      - monitoring
    restart: unless-stopped
    environment:
      - TZ=Asia/Hong_Kong

  # Grafana - 可視化監控面板
  grafana:
    image: grafana/grafana:10.1.0
    container_name: cbsc-grafana
    ports:
      - "3010:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=cbsc_admin_2025
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=grafana-piechart-panel,grafana-worldmap-panel,grafana-clock-panel
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=smtp.gmail.com:587
      - GF_SMTP_USER=alerts@cbsc.com
      - GF_SMTP_PASSWORD=your_smtp_password
      - GF_SMTP_FROM_ADDRESS=alerts@cbsc.com
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - prometheus

  # AlertManager - 告警管理和通知
  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: cbsc-alertmanager
    ports:
      - "9093:9093"
    volumes:
      - ./alertmanager_config.yml:/etc/alertmanager/alertmanager.yml:ro
      - alertmanager_data:/alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=http://localhost:9093'
    networks:
      - monitoring
    restart: unless-stopped

  # Node Exporter - 系統指標收集
  node-exporter:
    image: prom/node-exporter:v1.6.1
    container_name: cbsc-node-exporter
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - monitoring
    restart: unless-stopped

  # cAdvisor - 容器指標收集
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cbsc-cadvisor
    ports:
      - "8080:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    networks:
      - monitoring
    restart: unless-stopped

  # Redis Exporter - Redis指標收集
  redis-exporter:
    image: oliver006/redis_exporter:v1.45.0
    container_name: cbsc-redis-exporter
    ports:
      - "9121:9121"
    environment:
      - REDIS_ADDR=redis://localhost:6379
      - REDIS_PASSWORD=your_redis_password
    networks:
      - monitoring
    restart: unless-stopped

  # PostgreSQL Exporter - PostgreSQL指標收集
  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.12.0
    container_name: cbsc-postgres-exporter
    ports:
      - "9187:9187"
    environment:
      - DATA_SOURCE_NAME=postgresql://postgres:password@localhost:5432/cbsc_db?sslmode=disable
    networks:
      - monitoring
    restart: unless-stopped

  # Blackbox Exporter - 外部服務監控
  blackbox-exporter:
    image: prom/blackbox-exporter:v0.24.0
    container_name: cbsc-blackbox-exporter
    ports:
      - "9115:9115"
    volumes:
      - ./blackbox_config.yml:/etc/blackbox_exporter/config.yml:ro
    command:
      - '--config.file=/etc/blackbox_exporter/config.yml'
    networks:
      - monitoring
    restart: unless-stopped

  # Loki - 日誌聚合系統
  loki:
    image: grafana/loki:2.9.0
    container_name: cbsc-loki
    ports:
      - "3100:3100"
    volumes:
      - ./loki_config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring
    restart: unless-stopped

  # Promtail - 日誌收集代理
  promtail:
    image: grafana/promtail:2.9.0
    container_name: cbsc-promtail
    volumes:
      - ./promtail_config.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    command: -config.file=/etc/promtail/config.yml
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - loki

  # Nginx - 反向代理 (可選)
  nginx:
    image: nginx:1.24-alpine
    container_name: cbsc-monitoring-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - monitoring
    restart: unless-stopped
    depends_on:
      - grafana
      - prometheus

volumes:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  alertmanager_data:
    driver: local
  loki_data:
    driver: local

networks:
  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16