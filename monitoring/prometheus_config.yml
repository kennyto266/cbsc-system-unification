# CBSC系統 Prometheus 監控配置
# 監控配置文件 - 監控所有微服務的性能指標

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cbsc-production'
    environment: 'production'

rule_files:
  - "alert_rules.yml"
  - "recording_rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

# 監控目標配置
scrape_configs:
  # API網關監控
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['localhost:8000']
    metrics_path: '/metrics'
    scrape_interval: 10s
    scrape_timeout: 5s
    params:
      format: ['prometheus']

  # 用戶管理服務監控
  - job_name: 'user-management'
    static_configs:
      - targets: ['localhost:3004']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # 策略管理服務監控
  - job_name: 'strategy-management'
    static_configs:
      - targets: ['localhost:3003']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # 量化分析服務監控
  - job_name: 'quantitative-analysis'
    static_configs:
      - targets: ['localhost:8001']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # 數據管理服務監控
  - job_name: 'data-management'
    static_configs:
      - targets: ['localhost:3006']
    metrics_path: '/metrics'
    scrape_interval: 15s

  # 配置管理服務監控
  - job_name: 'config-service'
    static_configs:
      - targets: ['localhost:3005']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # 通知服務監控
  - job_name: 'notification-service'
    static_configs:
      - targets: ['localhost:3007']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # 監控服務自監控
  - job_name: 'monitoring-service'
    static_configs:
      - targets: ['localhost:3008']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # 文件服務監控
  - job_name: 'file-service'
    static_configs:
      - targets: ['localhost:3009']
    metrics_path: '/metrics'
    scrape_interval: 30s

  # Redis監控
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']
    scrape_interval: 15s

  # PostgreSQL監控
  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:9187']
    scrape_interval: 15s

  # 系統監控 (Node Exporter)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['localhost:9100']
    scrape_interval: 15s

  # 容器監控 (cAdvisor)
  - job_name: 'cadvisor'
    static_configs:
      - targets: ['localhost:8080']
    scrape_interval: 15s
    metrics_path: '/metrics'

  # Blackbox監控 (外部服務檢查)
  - job_name: 'blackbox'
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
        - http://localhost:8000/health
        - http://localhost:3004/health
        - http://localhost:3003/health
        - http://localhost:8001/api/health
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115