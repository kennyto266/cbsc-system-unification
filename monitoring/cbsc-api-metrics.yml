# CBSC Strategy API Prometheus Configuration
# CBSC策略API Prometheus监控配置

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'cbsc-strategy'
    environment: 'production'

# Rule files
rule_files:
  - "cbsc-api-rules.yml"
  - "cbsc-api-alerts.yml"

# Scrape configurations
scrape_configs:
  # Prometheus自身监控
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
    scrape_interval: 5s
    metrics_path: '/metrics'

  # CBSC Strategy API监控
  - job_name: 'cbsc-strategy-api'
    static_configs:
      - targets: ['cbsc-strategy-api:3004']
    scrape_interval: 10s
    metrics_path: '/metrics'
    scrape_timeout: 5s
    params:
      format: ['prometheus']

  # PostgreSQL数据库监控
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 10s

  # Redis监控
  - job_name: 'redis'
    static_configs:
      - targets: ['redis-exporter:9121']
    scrape_interval: 10s

  # Node Exporter (系统监控)
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 10s

  # Nginx监控
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx-exporter:9113']
    scrape_interval: 10s

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093