# Alertmanager Configuration for CBSC Strategy API
# CBSC策略API告警管理器配置

global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alerts@cbsc.com'
  smtp_auth_username: 'alerts@cbsc.com'
  smtp_auth_password: 'your-smtp-password'

# 路由配置
route:
  group_by: ['alertname', 'cluster', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    # 关键告警立即发送
    - match:
        severity: critical
      receiver: 'critical-alerts'
      continue: true
      group_wait: 0s
      repeat_interval: 5m

    # 数据库告警
    - match:
        service: postgresql
      receiver: 'database-alerts'

    # 监控系统告警
    - match:
        alertname: 'Watchdog'
      receiver: 'watchdog'

# 接收器配置
receivers:
  # 默认接收器
  - name: 'default'
    email_configs:
      - to: 'admin@cbsc.com'
        subject: '[CBSC] {{ .GroupLabels.alertname }} - {{ .Status | toUpper }}'
        body: |
          {{ range .Alerts }}
          告警: {{ .Annotations.summary }}
          描述: {{ .Annotations.description }}
          时间: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          标签: {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }} {{ end }}
          {{ end }}

  # 关键告警接收器
  - name: 'critical-alerts'
    email_configs:
      - to: 'admin@cbsc.com,ops@cbsc.com'
        subject: '[CRITICAL] CBSC Strategy API - {{ .GroupLabels.alertname }}'
        body: |
          🔴 **关键告警** 🔴

          {{ range .Alerts }}
          **告警名称**: {{ .Annotations.summary }}
          **描述**: {{ .Annotations.description }}
          **严重级别**: {{ .Labels.severity }}
          **服务**: {{ .Labels.service }}
          **开始时间**: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          **标签**: {{ range .Labels.SortedPairs }}{{ .Name }}={{ .Value }} {{ end }}

          **请立即处理！**
          {{ end }}
    webhook_configs:
      - url: 'http://localhost:8080/webhooks/critical'
        send_resolved: true

  # 数据库告警接收器
  - name: 'database-alerts'
    email_configs:
      - to: 'dba@cbsc.com'
        subject: '[Database] CBSC Strategy API - {{ .GroupLabels.alertname }}'
        body: |
          🗄️ **数据库告警** 🗄️

          {{ range .Alerts }}
          **告警**: {{ .Annotations.summary }}
          **描述**: {{ .Annotations.description }}
          **数据库**: PostgreSQL
          **时间**: {{ .StartsAt.Format "2006-01-02 15:04:05" }}
          {{ end }}

  # 系统监控告警
  - name: 'watchdog'
    email_configs:
      - to: 'admin@cbsc.com'
        subject: '[Watchdog] CBSC Monitoring System'
        body: |
          🐕 **监控系统状态** 🐕

          {{ range .Alerts }}
          **状态**: {{ .Status }}
          **消息**: {{ .Annotations.summary }}
          {{ end }}

# 抑制规则
inhibit_rules:
  # 如果API服务已关闭，抑制其他API相关告警
  - source_match:
      alertname: 'APIServiceDown'
      severity: 'critical'
    target_match_re:
      service: 'cbsc-strategy-api'
    equal: ['service']

  # 如果数据库已关闭，抑制数据库连接相关告警
  - source_match:
      alertname: 'PostgreSQLTooManyConnections'
      severity: 'critical'
    target_match_re:
      alertname: '(PostgreSQLSlowQueries|PostgreSQLHighCPU)'
    equal: ['service']

# 模板文件
templates:
  - '/etc/alertmanager/templates/*.tmpl'