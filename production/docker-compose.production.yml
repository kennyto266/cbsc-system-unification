version: '3.8'

services:
  # ============ 网络基础设施 ============
  nginx-proxy:
    image: nginx:1.24-alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./nginx/logs:/var/log/nginx
      - nginx_cache:/var/cache/nginx
    networks:
      - frontend
      - backend
      - monitoring
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    depends_on:
      - api-gateway
      - frontend-dashboard

  # ============ API网关服务 ============
  api-gateway:
    image: kong:3.4-alpine
    container_name: api-gateway
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: postgres
      KONG_PG_USER: kong_user
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD}
      KONG_PG_DATABASE: kong
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_ADMIN_GUI_URL: "http://localhost:8002"
      # JWT Plugin配置
      KONG_PLUGINS: jwt,bundled
      # CORS配置
      KONG_NGINX_PROXY_CORS_CREDENTIALS: "true"
      KONG_NGINX_PROXY_CORS_HEADERS: "Accept, Accept-Version, Content-Length, Content-MD5, Content-Type, Date, Authorization"
      KONG_NGINX_PROXY_CORS_METHODS: "GET, POST, PUT, DELETE, OPTIONS"
      KONG_NGINX_PROXY_CORS_ORIGIN: "*"
    networks:
      - backend
      - database
      - monitoring
    ports:
      - "8000:8000"  # Kong proxy
      - "8001:8001"  # Kong admin
      - "8002:8002"  # Kong manager
      - "8443:8443"  # Kong proxy ssl
      - "8444:8444"  # Kong admin ssl
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============ 核心业务服务 ============
  # CBSC量化交易系统 (端口3003)
  cbsc-trading-system:
    build:
      context: ./simplified_system
      dockerfile: Dockerfile.production
    container_name: cbsc-trading-system
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://cbsc_user:${CBSC_DB_PASSWORD}@postgres:5432/cbsc_trading
      - REDIS_URL=redis://redis-cluster:6379/1
      - KAFKA_BROKERS=kafka-cluster:9092
      - JWT_SECRET=${JWT_SECRET}
      - API_GATEWAY_URL=http://api-gateway:8000
      - PROMETHEUS_URL=http://prometheus:9090
      - LOG_LEVEL=INFO
      - TRACING_ENABLED=true
      - TRACING_ENDPOINT=http://jaeger:14268/api/traces
    volumes:
      - ./logs/cbsc:/app/logs
      - cbsc_data:/app/data
      - ./config/cbsc:/app/config:ro
    networks:
      - backend
      - database
      - message_queue
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
      redis-cluster:
        condition: service_healthy
      kafka-cluster:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3003/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    restart: unless-stopped

  # 用户管理系统 (端口3004)
  user-management-system:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    container_name: user-management-system
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://user_mgmt_user:${USER_MGMT_DB_PASSWORD}@postgres:5432/user_management
      - REDIS_URL=redis://redis-cluster:6379/2
      - JWT_SECRET=${JWT_SECRET}
      - EMAIL_SERVICE_URL=http://notification-service:3006
      - SMS_SERVICE_URL=http://notification-service:3007
      - LDAP_URL=ldap://ldap-service:389
      - API_GATEWAY_URL=http://api-gateway:8000
      - LOG_LEVEL=INFO
      - TRACING_ENABLED=true
      - TRACING_ENDPOINT=http://jaeger:14268/api/traces
    volumes:
      - ./logs/user-management:/app/logs
      - ./config/user-management:/app/config:ro
      - user_data:/app/data
    networks:
      - backend
      - database
      - monitoring
    depends_on:
      postgres:
        condition: service_healthy
      redis-cluster:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      replicas: 2
      resources:
        limits:
          memory: 1G
          cpus: '0.5'
        reservations:
          memory: 512M
          cpus: '0.25'
    restart: unless-stopped

  # 监控服务 (端口3005)
  monitoring-system:
    build:
      context: ./monitoring_system
      dockerfile: Dockerfile.production
    container_name: monitoring-system
    environment:
      - NODE_ENV=production
      - PROMETHEUS_URL=http://prometheus:9090
      - GRAFANA_URL=http://grafana:3000
      - ELASTICSEARCH_URL=http://elasticsearch:9200
      - REDIS_URL=redis://redis-cluster:6379/3
      - ALERT_MANAGER_URL=http://alertmanager:9093
      - LOG_LEVEL=INFO
    volumes:
      - ./logs/monitoring:/app/logs
      - ./config/monitoring:/app/config:ro
      - monitoring_data:/app/data
    networks:
      - backend
      - monitoring
    depends_on:
      - prometheus
      - grafana
      - elasticsearch
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3005/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============ 前端服务 ============
  frontend-dashboard:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    container_name: frontend-dashboard
    environment:
      - NODE_ENV=production
      - REACT_APP_API_BASE_URL=https://api.example.com
      - REACT_APP_WS_URL=wss://api.example.com
      - REACT_APP_CBSC_API_URL=http://cbsc-trading-system:3003
      - REACT_APP_USER_API_URL=http://user-management-system:3004
      - REACT_APP_MONITORING_URL=http://monitoring-system:3005
    volumes:
      - nginx_frontend_cache:/var/cache/nginx
    networks:
      - frontend
      - backend
    depends_on:
      - cbsc-trading-system
      - user-management-system
      - monitoring-system
    restart: unless-stopped

  # ============ 数据库服务 ============
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      POSTGRES_DB: postgres
      # 多数据库配置
      POSTGRES_MULTIPLE_DATABASES: cbsc_trading,cbsc_user,kong,monitoring_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d:ro
      - ./database/config/postgresql.conf:/etc/postgresql/postgresql.conf:ro
      - postgres_backup:/backup
    networks:
      - database
      - monitoring
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
        reservations:
          memory: 2G
          cpus: '1.0'
    restart: unless-stopped

  # ============ 缓存服务 ============
  redis-cluster:
    image: redis:7.2-alpine
    container_name: redis-cluster
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - ./cache/redis.conf:/usr/local/etc/redis/redis.conf:ro
    networks:
      - database
      - monitoring
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
        reservations:
          memory: 1G
          cpus: '0.5'
    restart: unless-stopped

  # ============ 消息队列 ============
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_SYNC_LIMIT: 2
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    networks:
      - message_queue
    restart: unless-stopped

  kafka-cluster:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-cluster
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka-cluster:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_JMX_PORT: 9101
      KAFKA_JMX_HOSTNAME: localhost
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_DELETE_TOPIC_ENABLE: 'true'
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - message_queue
      - monitoring
    ports:
      - "9092:9092"
      - "9101:9101"
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # ============ 监控系统 ============
  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=50GB'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
      - '--web.external-url=https://prometheus.example.com'
    volumes:
      - prometheus_data:/prometheus
      - ./monitoring/prometheus:/etc/prometheus:ro
    networks:
      - monitoring
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-piechart-panel,grafana-worldmap-panel
      GF_SECURITY_ALLOW_EMBEDDING: true
      GF_AUTH_ANONYMOUS_ENABLED: false
      GF_SERVER_ROOT_URL: https://grafana.example.com
      GF_SERVER_DOMAIN: grafana.example.com
      GF_SMTP_ENABLED: true
      GF_SMTP_HOST: ${SMTP_HOST}
      GF_SMTP_USER: ${SMTP_USER}
      GF_SMTP_PASSWORD: ${SMTP_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - monitoring
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  alertmanager:
    image: prom/alertmanager:v0.26.0
    container_name: alertmanager
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
      - '--web.external-url=https://alertmanager.example.com'
    volumes:
      - alertmanager_data:/alertmanager
      - ./monitoring/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./monitoring/alertmanager/templates:/etc/alertmanager/templates:ro
    networks:
      - monitoring
    ports:
      - "9093:9093"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9093/-/healthy"]
      interval: 30s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  # ============ 日志聚合 ============
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.10.0
    container_name: elasticsearch
    environment:
      - node.name=elasticsearch
      - cluster.name=es-cluster
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
      - ./logs/elasticsearch:/usr/share/elasticsearch/logs
    networks:
      - monitoring
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.10.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - SERVER_NAME=kibana.example.com
      - SERVER_HOST=0.0.0.0
    volumes:
      - kibana_data:/usr/share/kibana/data
    networks:
      - monitoring
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.10.0
    container_name: filebeat
    user: root
    environment:
      - setup.kibana.host=kibana:5601
      - output.elasticsearch.hosts=["elasticsearch:9200"]
    volumes:
      - ./logging/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/var/log/app:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - monitoring
    depends_on:
      - elasticsearch
    restart: unless-stopped

  # ============ 分布式追踪 ============
  jaeger:
    image: jaegertracing/all-in-one:1.49
    container_name: jaeger
    environment:
      COLLECTOR_OTLP_ENABLED: true
    ports:
      - "16686:16686"  # Jaeger UI
      - "14268:14268"  # HTTP collector
      - "6831:6831"   # UDP collector
      - "6832:6832"   # UDP collector
    networks:
      - monitoring
    restart: unless-stopped

  # ============ 通知服务 ============
  notification-service:
    build:
      context: ./notification_service
      dockerfile: Dockerfile.production
    container_name: notification-service
    environment:
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_USER=${SMTP_USER}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - REDIS_URL=redis://redis-cluster:6379/4
      - LOG_LEVEL=INFO
    networks:
      - backend
      - database
    depends_on:
      - redis-cluster
    restart: unless-stopped

# ============ 网络配置 ============
networks:
  frontend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24

  backend:
    driver: bridge
    ipam:
      config:
        - subnet: 172.21.0.0/24

  database:
    driver: bridge
    ipam:
      config:
        - subnet: 172.22.0.0/24
    internal: true  # 数据库网络不对外访问

  message_queue:
    driver: bridge
    ipam:
      config:
        - subnet: 172.23.0.0/24
    internal: true  # 消息队列网络不对外访问

  monitoring:
    driver: bridge
    ipam:
      config:
        - subnet: 172.24.0.0/24

# ============ 存储卷 ============
volumes:
  postgres_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/postgres

  redis_data:
    driver: local

  kafka_data:
    driver: local

  zookeeper_data:
    driver: local

  zookeeper_logs:
    driver: local

  prometheus_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/prometheus

  grafana_data:
    driver: local

  alertmanager_data:
    driver: local

  elasticsearch_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /data/elasticsearch

  kibana_data:
    driver: local

  nginx_cache:
    driver: local

  nginx_frontend_cache:
    driver: local

  cbsc_data:
    driver: local

  user_data:
    driver: local

  monitoring_data:
    driver: local

  postgres_backup:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /backup/postgres