# CBSC交易系统Kubernetes部署配置

---
# CBSC交易系统服务定义
apiVersion: v1
kind: Service
metadata:
  name: cbsc-trading-system
  namespace: production
  labels:
    app: cbsc-trading-system
    component: trading-engine
    version: v1
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9090"
    prometheus.io/path: "/metrics"
    description: "CBSC量化交易系统核心服务"
spec:
  type: ClusterIP
  ports:
  - name: http
    port: 3003
    targetPort: 3003
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: 9090
    protocol: TCP
  selector:
    app: cbsc-trading-system
    component: trading-engine

---
# CBSC交易系统部署配置
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cbsc-trading-system
  namespace: production
  labels:
    app: cbsc-trading-system
    component: trading-engine
    version: v1
    environment: production
  annotations:
    deployment.kubernetes.io/revision: "1"
    description: "CBSC量化交易系统部署"
spec:
  replicas: 3  # 生产环境多副本部署
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
  selector:
    matchLabels:
      app: cbsc-trading-system
      component: trading-engine
  template:
    metadata:
      labels:
        app: cbsc-trading-system
        component: trading-engine
        version: v1
        environment: production
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: cbsc-service-account
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault

      containers:
      - name: cbsc-trading-system
        image: ghcr.io/your-org/cbsc-trading:latest
        imagePullPolicy: Always

        # 安全上下文
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
          runAsNonRoot: true
          runAsUser: 1000

        # 环境变量
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: NODE_ENV
        - name: LOG_LEVEL
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: LOG_LEVEL
        - name: DATABASE_URL
          value: "postgresql://cbsc_user:$(CBSC_DB_PASSWORD)@postgres.production.svc.cluster.local:5432/cbsc_trading"
        - name: CBSC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: cbsc-db-password
        - name: REDIS_URL
          value: "redis://:$(REDIS_PASSWORD)@redis-cluster.production.svc.cluster.local:6379/1"
        - name: REDIS_PASSWORD
          valueFrom:
            secretKeyRef:
              name: redis-credentials
              key: redis-password
        - name: KAFKA_BROKERS
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: KAFKA_BOOTSTRAP_SERVERS
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: jwt-secrets
              key: jwt-secret
        - name: STOCK_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: stock-api-key
        - name: HKMA_API_KEY
          valueFrom:
            secretKeyRef:
              name: api-keys
              key: hkma-api-key
        - name: TRACING_ENABLED
          valueFrom:
            configMapKeyRef:
              name: app-config
              key: TRACING_ENABLED
        - name: TRACING_ENDPOINT
          value: "http://jaeger.monitoring.svc.cluster.local:14268/api/traces"

        # 端口配置
        ports:
        - name: http
          containerPort: 3003
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP

        # 资源限制和请求
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1000m"

        # 健康检查
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3003
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 3
          successThreshold: 1

        readinessProbe:
          httpGet:
            path: /api/ready
            port: 3003
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
          successThreshold: 1
          httpHeaders:
          - name: Content-Type
            value: "application/json"

        # 启动探针
        startupProbe:
          httpGet:
            path: /api/health
            port: 3003
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 30
          successThreshold: 1

        # 卷挂载
        volumeMounts:
        - name: config-volume
          mountPath: /app/config
          readOnly: true
        - name: logs-volume
          mountPath: /app/logs
        - name: tmp-volume
          mountPath: /tmp
        - name: cache-volume
          mountPath: /app/cache
        - name: data-volume
          mountPath: /app/data

        # 生命周期钩子
        lifecycle:
          preStop:
            exec:
              command: ["/bin/sh", "-c", "echo 'Terminating CBSC system...' && sleep 15"]
          postStart:
            exec:
              command: ["/bin/sh", "-c", "echo 'Starting CBSC system...' && python /app/scripts/init_system.py"]

      # 初始化容器
      initContainers:
      - name: migrate-db
        image: ghcr.io/your-org/cbsc-trading:latest
        command: ["python", "scripts/migrate.py"]
        env:
        - name: DATABASE_URL
          value: "postgresql://cbsc_user:$(CBSC_DB_PASSWORD)@postgres.production.svc.cluster.local:5432/cbsc_trading"
        - name: CBSC_DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: database-credentials
              key: cbsc-db-password
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "200m"

      - name: check-dependencies
        image: busybox:1.35
        command: ["sh", "-c", "until nc -z postgres.production.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done && until nc -z redis-cluster.production.svc.cluster.local 6379; do echo waiting for redis; sleep 2; done"]
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"

      # 服务账户
      serviceAccountName: cbsc-service-account

      # 安全设置
      automountServiceAccountToken: true

      # 节点选择
      nodeSelector:
        node-type: application
        environment: production

      # 容忍度
      tolerations:
      - key: "dedicated"
        operator: "Equal"
        value: "cbsc-trading"
        effect: "NoSchedule"

      # 亲和性
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - cbsc-trading-system
              topologyKey: kubernetes.io/hostname

      # 卷配置
      volumes:
      - name: config-volume
        configMap:
          name: cbsc-config
      - name: logs-volume
        emptyDir: {}
      - name: tmp-volume
        emptyDir: {}
      - name: cache-volume
        emptyDir:
          sizeLimit: 1Gi
      - name: data-volume
        persistentVolumeClaim:
          claimName: cbsc-data-pvc

---
# CBSC系统PVC
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cbsc-data-pvc
  namespace: production
  labels:
    app: cbsc-trading-system
    component: storage
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: fast-ssd
  resources:
    requests:
      storage: 100Gi

---
# CBSC系统HPA（水平自动扩缩容）
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: cbsc-trading-system-hpa
  namespace: production
  labels:
    app: cbsc-trading-system
    component: autoscaling
  annotations:
    description: "CBSC交易系统水平自动扩缩容"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cbsc-trading-system
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  - type: Pods
    pods:
      metric:
        name: http_requests_per_second
      target:
        type: AverageValue
        averageValue: "100"
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 60
      policies:
      - type: Percent
        value: 50
        periodSeconds: 60
      - type: Pods
        value: 2
        periodSeconds: 60
      selectPolicy: Max
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 10
        periodSeconds: 60
      - type: Pods
        value: 1
        periodSeconds: 60
      selectPolicy: Min

---
# CBSC系统VPA（垂直自动扩缩容）
apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: cbsc-trading-system-vpa
  namespace: production
  labels:
    app: cbsc-trading-system
    component: vertical-autoscaling
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: cbsc-trading-system
  updatePolicy:
    updateMode: "Auto"
  resourcePolicy:
    containerPolicies:
    - containerName: cbsc-trading-system
      maxAllowed:
        cpu: 2
        memory: 4Gi
      minAllowed:
        cpu: 100m
        memory: 256Mi
      controlledResources: ["cpu", "memory"]

---
# CBSC系统PodDisruptionBudget
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: cbsc-trading-system-pdb
  namespace: production
  labels:
    app: cbsc-trading-system
    component: availability
spec:
  minAvailable: 2
  selector:
    matchLabels:
      app: cbsc-trading-system
      component: trading-engine

---
# CBSC系统网络策略
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cbsc-trading-system-netpol
  namespace: production
  labels:
    app: cbsc-trading-system
    component: network-security
spec:
  podSelector:
    matchLabels:
      app: cbsc-trading-system
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: networking
    - namespaceSelector:
        matchLabels:
          name: monitoring
    - podSelector:
        matchLabels:
          app: user-management-system
    ports:
    - protocol: TCP
      port: 3003
    - protocol: TCP
      port: 9090
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: database
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - namespaceSelector:
        matchLabels:
          name: database
    ports:
    - protocol: TCP
      port: 6379
  - to:
    - namespaceSelector:
        matchLabels:
          name: message-queue
    ports:
    - protocol: TCP
      port: 9092
  - to: []
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 443
    - protocol: UDP
      port: 123

---
# CBSC系统服务账户
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cbsc-service-account
  namespace: production
  labels:
    app: cbsc-trading-system
    component: rbac
  annotations:
    description: "CBSC交易系统服务账户"

---
# CBSC系统RBAC权限
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cbsc-trading-system-role
  labels:
    app: cbsc-trading-system
    component: rbac
rules:
- apiGroups: [""]
  resources: ["pods", "services", "endpoints"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cbsc-trading-system-binding
  labels:
    app: cbsc-trading-system
    component: rbac
subjects:
- kind: ServiceAccount
  name: cbsc-service-account
  namespace: production
roleRef:
  kind: ClusterRole
  name: cbsc-trading-system-role
  apiGroup: rbac.authorization.k8s.io