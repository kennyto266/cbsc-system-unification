# 生产环境配置映射文件

---
# 应用程序配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: production
  labels:
    app: cbsc-system
    component: application
data:
  # 应用环境变量
  NODE_ENV: "production"
  LOG_LEVEL: "INFO"
  DEBUG: "false"

  # 数据库配置
  DATABASE_HOST: "postgres.production.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_SSL_MODE: "require"
  DATABASE_POOL_SIZE: "20"
  DATABASE_MAX_OVERFLOW: "10"

  # Redis配置
  REDIS_HOST: "redis-cluster.production.svc.cluster.local"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_POOL_SIZE: "10"
  REDIS_TIMEOUT: "30"

  # Kafka配置
  KAFKA_BOOTSTRAP_SERVERS: "kafka-cluster.production.svc.cluster.local:9092"
  KAFKA_CONSUMER_GROUP: "cbsc-production"
  KAFKA_AUTO_OFFSET_RESET: "earliest"
  KAFKA_ENABLE_AUTO_COMMIT: "true"

  # API配置
  API_RATE_LIMIT: "100"
  API_TIMEOUT: "30"
  API_MAX_CONNECTIONS: "1000"

  # 缓存配置
  CACHE_TTL: "3600"
  CACHE_MAX_SIZE: "1000"

  # 监控配置
  METRICS_ENABLED: "true"
  TRACING_ENABLED: "true"
  PROFILING_ENABLED: "false"

  # 安全配置
  CORS_ORIGIN: "https://app.example.com"
  CORS_METHODS: "GET,POST,PUT,DELETE,OPTIONS"
  CORS_HEADERS: "Authorization,Content-Type,Accept"

  # CBSC特定配置
  CBSC_DATA_SOURCE: "production"
  CBSC_RISK_LIMIT: "1000000"
  CBSC_MAX_TRADES_PER_DAY: "1000"
  CBSC_TRADING_HOURS_START: "09:30"
  CBSC_TRADING_HOURS_END: "16:00"

---
# CBSC交易系统配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: cbsc-config
  namespace: production
  labels:
    app: cbsc-trading-system
    component: trading-engine
data:
  # 策略配置
  DEFAULT_STRATEGY: "advanced_sentiment"
  SENTIMENT_UPDATE_INTERVAL: "60"
  RISK_ASSESSMENT_INTERVAL: "30"

  # 市场数据配置
  MARKET_DATA_SOURCE: "hkex"
  DATA_UPDATE_FREQUENCY: "5"
  DATA_QUALITY_THRESHOLD: "95"

  # 回测配置
  BACKTEST_LOOKBACK_DAYS: "365"
  BACKTEST_SLIPPAGE: "0.001"
  BACKTEST_COMMISSION: "0.001"

  # 实时交易配置
  LIVE_TRADING_ENABLED: "false"  # 生产环境手动控制
  EMERGENCY_STOP_ENABLED: "true"
  POSITION_SIZE_LIMIT: "100000"

  # 数据质量配置
  DATA_VALIDATION_ENABLED: "true"
  ANOMALY_DETECTION_ENABLED: "true"
  DATA_BACKUP_FREQUENCY: "24"

---
# 用户管理系统配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: user-management-config
  namespace: production
  labels:
    app: user-management-system
    component: auth-service
data:
  # 认证配置
  SESSION_TIMEOUT: "7200"
  PASSWORD_MIN_LENGTH: "12"
  PASSWORD_EXPIRY_DAYS: "90"
  MAX_LOGIN_ATTEMPTS: "5"
  LOCKOUT_DURATION: "900"

  # MFA配置
  MFA_ENABLED: "true"
  MFA_ISSUER: "CBSC Trading System"
  MFA_DIGITS: "6"
  MFA_VALIDITY_PERIOD: "30"

  # 权限配置
  DEFAULT_ROLE: "trader"
  ADMIN_ROLE: "administrator"
  SUPER_ADMIN_ROLE: "super_administrator"

  # 审计配置
  AUDIT_LOG_ENABLED: "true"
  AUDIT_RETENTION_DAYS: "2555"  # 7年

  # 通知配置
  EMAIL_VERIFICATION_REQUIRED: "true"
  PASSWORD_RESET_EXPIRY: "3600"
  NOTIFICATION_BATCH_SIZE: "100"

---
# 监控配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-config
  namespace: monitoring
  labels:
    app: monitoring
    component: prometheus
data:
  # Prometheus配置
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'production'
        environment: 'production'

    rule_files:
      - "/etc/prometheus/rules/*.yml"
      - "/etc/prometheus/alert_rules/*.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093

    scrape_configs:
      # CBSC系统监控
      - job_name: 'cbsc-trading-system'
        static_configs:
          - targets: ['cbsc-trading-system:3003']
        metrics_path: '/metrics'
        scrape_interval: 30s
        scrape_timeout: 10s

      # 用户管理系统监控
      - job_name: 'user-management-system'
        static_configs:
          - targets: ['user-management-system:3004']
        metrics_path: '/metrics'
        scrape_interval: 30s

      # 监控系统自监控
      - job_name: 'monitoring-system'
        static_configs:
          - targets: ['monitoring-system:3005']
        metrics_path: '/metrics'
        scrape_interval: 30s

      # Kubernetes监控
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - source_labels: [__address__]
            regex: '(.*):10250'
            target_label: __address__
            replacement: '${1}:9100'

      # API网关监控
      - job_name: 'api-gateway'
        static_configs:
          - targets: ['api-gateway:8001']
        metrics_path: '/metrics'
        scrape_interval: 15s

  # 告警规则配置
  alert_rules.yml: |
    groups:
    - name: cbsc_system.rules
      rules:
      # 系统可用性告警
      - alert: ServiceDown
        expr: up == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "Service {{ $labels.job }} has been down for more than 2 minutes."

      # 高错误率告警
      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second."

      # 高延迟告警
      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is {{ $value }} seconds."

      # CPU使用率告警
      - alert: HighCPUUsage
        expr: rate(process_cpu_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is {{ $value }}%."

      # 内存使用率告警
      - alert: HighMemoryUsage
        expr: (process_resident_memory_bytes / 1024 / 1024) > 1024
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value }}MB."

---
# Grafana配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: monitoring
  labels:
    app: monitoring
    component: grafana
data:
  grafana.ini: |
    [server]
    root_url = https://grafana.example.com
    domain = grafana.example.com
    serve_from_sub_path = true

    [security]
    admin_user = admin
    admin_password = {{ .Values.grafana.adminPassword }}
    secret_key = {{ .Values.grafana.secretKey }}

    [database]
    type = postgres
    host = postgres.production.svc.cluster.local:5432
    name = grafana
    user = grafana_user
    password = {{ .Values.grafana.dbPassword }}

    [smtp]
    enabled = true
    host = {{ .Values.smtp.host }}:{{ .Values.smtp.port }}
    user = {{ .Values.smtp.user }}
    password = {{ .Values.smtp.password }}
    from_address = {{ .Values.smtp.from }}

    [auth.proxy]
    enabled = false

    [log]
    level = info

    [users]
    allow_sign_up = false

    [alerting]
    enabled = true

    [dashboards]
    default_home_dashboard_path = /etc/grafana/provisioning/dashboards/home.json

---
# Nginx配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: networking
  labels:
    app: ingress
    component: nginx
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
        worker_connections 1024;
        use epoll;
        multi_accept on;
    }

    http {
        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        # 日志格式
        log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                        '$status $body_bytes_sent "$http_referer" '
                        '"$http_user_agent" "$http_x_forwarded_for" '
                        'rt=$request_time uct="$upstream_connect_time" '
                        'uht="$upstream_header_time" urt="$upstream_response_time"';

        access_log /var/log/nginx/access.log main;

        # 性能优化
        sendfile on;
        tcp_nopush on;
        tcp_nodelay on;
        keepalive_timeout 65;
        types_hash_max_size 2048;

        # Gzip压缩
        gzip on;
        gzip_vary on;
        gzip_min_length 1024;
        gzip_types
            text/plain
            text/css
            text/xml
            text/javascript
            application/javascript
            application/xml+rss
            application/json;

        # 安全头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # 限制请求
        client_max_body_size 10m;
        client_body_buffer_size 128k;
        client_header_buffer_size 1k;
        large_client_header_buffers 4 4k;

        # 上游服务器配置
        upstream cbsc_backend {
            server cbsc-trading-system.production.svc.cluster.local:3003 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        upstream user_mgmt_backend {
            server user-management-system.production.svc.cluster.local:3004 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        upstream monitoring_backend {
            server monitoring-system.production.svc.cluster.local:3005 max_fails=3 fail_timeout=30s;
            keepalive 32;
        }

        # 主服务器配置
        server {
            listen 80;
            server_name app.example.com;

            # 重定向到HTTPS
            return 301 https://$server_name$request_uri;
        }

        server {
            listen 443 ssl http2;
            server_name app.example.com;

            # SSL配置
            ssl_certificate /etc/nginx/ssl/tls.crt;
            ssl_certificate_key /etc/nginx/ssl/tls.key;
            ssl_protocols TLSv1.2 TLSv1.3;
            ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384;
            ssl_prefer_server_ciphers off;
            ssl_session_cache shared:SSL:10m;
            ssl_session_timeout 10m;

            # 路由配置
            location /api/v1/trading/ {
                proxy_pass http://cbsc_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 30s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
            }

            location /api/v1/users/ {
                proxy_pass http://user_mgmt_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 30s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
            }

            location /api/v1/monitoring/ {
                proxy_pass http://monitoring_backend;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;
                proxy_connect_timeout 30s;
                proxy_send_timeout 30s;
                proxy_read_timeout 30s;
            }

            # 静态文件服务
            location / {
                root /usr/share/nginx/html;
                index index.html index.htm;
                try_files $uri $uri/ /index.html;
                expires 1d;
                add_header Cache-Control "public, immutable";
            }

            # 健康检查
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }
        }
    }

---
# 日志配置
apiVersion: v1
kind: ConfigMap
metadata:
  name: logging-config
  namespace: logging
  labels:
    app: logging
    component: filebeat
data:
  filebeat.yml: |
    filebeat.inputs:
    - type: log
      enabled: true
      paths:
        - /var/log/app/*.log
        - /var/log/app/*/*.log
      fields:
        logtype: application
        environment: production
      fields_under_root: true
      multiline.pattern: '^\d{4}-\d{2}-\d{2}'
      multiline.negate: true
      multiline.match: after

    - type: container
      enabled: true
      paths:
        - '/var/lib/docker/containers/*/*.log'
      processors:
        - add_docker_metadata:
            host: "unix:///var/run/docker.sock"

    output.elasticsearch:
      hosts: ["elasticsearch.logging.svc.cluster.local:9200"]
      index: "cbsc-logs-%{+yyyy.MM.dd}"
      template.name: "cbsc"
      template.pattern: "cbsc-*"
      template.settings:
        index.number_of_shards: 1
        index.number_of_replicas: 1

    setup.kibana:
      host: "kibana.logging.svc.cluster.local:5601"

    setup.template.name: "cbsc"
    setup.template.pattern: "cbsc-*"

    logging.level: info
    logging.to_files: true
    logging.files:
      path: /var/log/filebeat
      name: filebeat
      keepfiles: 7
      permissions: 0644