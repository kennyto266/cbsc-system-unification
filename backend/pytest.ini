[pytest]
# Pytest configuration for CBSC Trading System

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov-report=term-missing
    --cov-report=html:htmlcov
    --cov-report=xml:coverage.xml
    --asyncio-mode=auto
    --maxfail=5
    -p no:warnings

# Markers for organizing tests
markers =
    unit: Unit tests (fast, isolated)
    integration: Integration tests (slower, may use database)
    e2e: End-to-end tests (slowest, full system)
    slow: Slow running tests
    asyncio: Async tests
    websocket: WebSocket related tests
    api: API endpoint tests
    database: Database related tests
    auth: Authentication tests
    strategy: Strategy management tests
    monitoring: Monitoring and metrics tests

# Coverage settings
[coverage:run]
source = .
omit = 
    */tests/*
    */test_*.py
    */__pycache__/*
    */venv*/*
    */.venv*/*
    */migrations/*
    */alembic/*
    */config/settings/*
    setup.py

[coverage:report]
precision = 2
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstract
    @abstractmethod
    class .*Protocol:

[coverage:html]
directory = htmlcov
