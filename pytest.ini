[pytest]
# Test discovery
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output formatting
addopts =
    -v
    --tb=short
    --strict-markers
    --color=yes
    --durations=10

# Minimum version
minversion = 6.0

# Test session configuration
console_output_style = progress
junit_family = xunit2

# Asyncio configuration
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test markers for asyncio testing
markers =
    asyncio: asyncio tests
    unit: Unit tests for individual components
    integration: Integration tests for component interaction
    performance: Performance tests with timing requirements
    cbsc_specific: CBSC-specific functionality tests
    slow: Tests that take longer to run (>30 seconds)
    data_quality: Data validation and quality tests
    edge_cases: Edge case and error handling tests
    risk_management: Risk management and validation tests
    api: API tests
    security: Security tests