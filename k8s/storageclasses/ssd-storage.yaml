---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: cbsc-ssd-storage
  labels:
    app: cbsc-strategy-management
    storage-type: ssd
provisioner: kubernetes.io/aws-ebs
parameters:
  type: gp3
  iops: "3000"
  throughput: "125"
  fsType: ext4
allowVolumeExpansion: true
volumeBindingMode: WaitForFirstConsumer
reclaimPolicy: Retain