# Kubernetes Services for CBSC Strategy Management System

---
# Main API Service
apiVersion: v1
kind: Service
metadata:
  name: cbsc-strategy-api-service
  namespace: cbsc-strategy
  labels:
    app: cbsc-strategy
    component: api
    service-type: main
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "3005"
    prometheus.io/path: "/metrics"
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "http"
    service.beta.kubernetes.io/aws-load-balancer-ssl-ports: "443"
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  - name: https
    port: 443
    targetPort: http
    protocol: TCP
  - name: metrics
    port: 3005
    targetPort: metrics
    protocol: TCP
  selector:
    app: cbsc-strategy
    component: api

---
# Internal API Service (for service-to-service communication)
apiVersion: v1
kind: Service
metadata:
  name: cbsc-strategy-api-internal
  namespace: cbsc-strategy
  labels:
    app: cbsc-strategy
    component: api
    service-type: internal
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-internal: "true"
spec:
  type: ClusterIP
  sessionAffinity: None
  ports:
  - name: http
    port: 80
    targetPort: http
    protocol: TCP
  selector:
    app: cbsc-strategy
    component: api

---
# Headless Service for StatefulSets (if needed)
apiVersion: v1
kind: Service
metadata:
  name: cbsc-strategy-api-headless
  namespace: cbsc-strategy
  labels:
    app: cbsc-strategy
    component: api
    service-type: headless
spec:
  type: ClusterIP
  clusterIP: None
  publishNotReadyAddresses: true
  ports:
  - name: http
    port: 3004
    targetPort: http
    protocol: TCP
  selector:
    app: cbsc-strategy
    component: api

---
# Service Monitor for Prometheus
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: cbsc-strategy-api-monitor
  namespace: cbsc-strategy
  labels:
    app: cbsc-strategy
    component: monitoring
  annotations:
    prometheus.io/scrape: "true"
spec:
  selector:
    matchLabels:
      app: cbsc-strategy
      component: api
  endpoints:
  - port: metrics
    path: /metrics
    interval: 30s
    scrapeTimeout: 10s
    honorLabels: true
    metricRelabelings:
    - sourceLabels: [__name__]
      regex: 'flask_http_request_total|flask_request_duration_seconds'
      action: keep

---
# Ingress for external access
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cbsc-strategy-api-ingress
  namespace: cbsc-strategy
  labels:
    app: cbsc-strategy
    component: ingress
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/rate-limit: "1000"
    nginx.ingress.kubernetes.io/rate-limit-window: "1m"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://dashboard.cbsc.com,https://api.cbsc.com"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  tls:
  - hosts:
    - api.cbsc.com
    - strategy-api.cbsc.com
    secretName: cbsc-strategy-api-tls
  rules:
  - host: api.cbsc.com
    http:
      paths:
      - path: /api/v2(/|$)(.*)
        pathType: Prefix
        backend:
          service:
            name: cbsc-strategy-api-service
            port:
              number: 80
      - path: /health
        pathType: Exact
        backend:
          service:
            name: cbsc-strategy-api-service
            port:
              number: 80
      - path: /metrics
        pathType: Exact
        backend:
          service:
            name: cbsc-strategy-api-service
            port:
              number: 3005
  - host: strategy-api.cbsc.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: cbsc-strategy-api-service
            port:
              number: 80

---
# Network Policy for security
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: cbsc-strategy-api-netpol
  namespace: cbsc-strategy
  labels:
    app: cbsc-strategy
    component: network-policy
spec:
  podSelector:
    matchLabels:
      app: cbsc-strategy
      component: api
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow traffic from ingress controller
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx
    ports:
    - protocol: TCP
      port: 3004
  # Allow traffic from monitoring
  - from:
    - namespaceSelector:
        matchLabels:
          name: monitoring
    ports:
    - protocol: TCP
      port: 3005
  # Allow traffic from same namespace
  - from:
    - podSelector: {}
    ports:
    - protocol: TCP
      port: 3004
    - protocol: TCP
      port: 3005
  egress:
  # Allow DNS
  - to: []
    ports:
    - protocol: UDP
      port: 53
  # Allow PostgreSQL
  - to:
    - podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  # Allow Redis
  - to:
    - podSelector:
        matchLabels:
          app: redis
    ports:
    - protocol: TCP
      port: 6379
  # Allow external APIs (if needed)
  - to: []
    ports:
    - protocol: TCP
      port: 443
    - protocol: TCP
      port: 80