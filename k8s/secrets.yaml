# Secrets template for CBSC System
# Note: Actual secrets should be created using kubectl apply -f or sealed-secrets

# ============ Database Secrets ============
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secrets
  namespace: cbsc-system
type: Opaque
data:
  # Base64 encoded values (replace with actual encoded secrets)
  POSTGRES_USER: cG9zdGdyZXM=  # postgres
  POSTGRES_PASSWORD: c3VwZXJfc2VjcmV0X3Bhc3N3b3Jk  # super_secret_password
  POSTGRES_DB: Y2JzYw==  # cbsc
  POSTGRES_REPLICATION_USER: cmVwbGljYXRvcg==  # replicator
  POSTGRES_REPLICATION_PASSWORD: cmVwbGljYXRvcl9wYXNz  # replicator_pass

---
# ============ Redis Secrets ============
apiVersion: v1
kind: Secret
metadata:
  name: redis-secrets
  namespace: cbsc-system
type: Opaque
data:
  REDIS_PASSWORD: cmVkaXNfc3VwZXJfc2VjcmV0X3Bhc3N3b3Jk  # redis_super_secret_password

---
# ============ JWT Secrets ============
apiVersion: v1
kind: Secret
metadata:
  name: jwt-secrets
  namespace: cbsc-system
type: Opaque
data:
  JWT_SECRET: and0X3N1cGVyX3NlY3JldF9qd3Rfc2VjcmV0X2tleQ==  # jwt_super_secret_jwt_secret_key
  JWT_REFRESH_SECRET: and0X3JlZnJlc2hfc3VwZXJfc2VjcmV0X2tleQ==  # jwt_refresh_super_secret_key

---
# ============ External API Secrets ============
apiVersion: v1
kind: Secret
metadata:
  name: external-api-secrets
  namespace: cbsc-system
type: Opaque
data:
  # Market data API
  MARKET_API_KEY: bWFya2V0X2FwaV9rZXlfYmFzZTY0  # market_api_key_base64
  MARKET_API_SECRET: bWFya2V0X2FwaV9zZWNyZXRfYmFzZTY0  # market_api_secret_base64

  # Notification services
  SLACK_WEBHOOK_URL: aHR0cHM6Ly9ob29rcy5zbGFjay5jb20vc2VydmljZXMv  # https://hooks.slack.com/services/
  SMTP_PASSWORD: c210cF9wYXNzd29yZF9iYXNlNjQ=  # smtp_password_base64

  # Storage services
  AWS_ACCESS_KEY: YXdzX2FjY2Vzc19rZXlfYmFzZTY0  # aws_access_key_base64
  AWS_SECRET_KEY: YXdzX3NlY3JldF9rZXlfYmFzZTY0  # aws_secret_key_base64

---
# ============ TLS Certificates ============
apiVersion: v1
kind: Secret
metadata:
  name: tls-certs
  namespace: cbsc-system
type: kubernetes.io/tls
data:
  tls.crt: <base64-encoded-tls-certificate>
  tls.key: <base64-encoded-tls-private-key>

---
# ============ Docker Registry Secret ============
apiVersion: v1
kind: Secret
metadata:
  name: ghcr-secret
  namespace: cbsc-system
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: eyJhdXRocyI6eyJnaGNyLmlvIjp7InVzZXJuYW1lIjoiZ2l0aHViX2FjdG9yIiwicGFzc3dvcmQiOiJnaXRodWJfcGF0X3Rva2VuIiwiYXV0aCI6ImZvbyJ9fX0=  # Replace with actual docker config

---
