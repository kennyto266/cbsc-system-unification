# Kubernetes Secrets for CBSC Strategy Management System
apiVersion: v1
kind: Secret
metadata:
  name: cbsc-strategy-secrets
  namespace: cbsc-strategy
  labels:
    app: cbsc-strategy
    component: secrets
type: Opaque
data:
  # Base64 encoded secrets
  # To generate: echo -n "your-secret" | base64
  DATABASE_PASSWORD: "Y2JzY19wYXNzd29yZF9jaGFuZ2VfaW5fcHJvZHVjdGlvbg=="  # cbsc_password_change_in_production
  REDIS_PASSWORD: ""
  SECRET_KEY: "YmFzZTY0LWVuY29kZWQtc2VjcmV0LWtleS1yZXBsYWNlLWluLXByb2R1Y3Rpb24="
  JWT_SECRET_KEY: "YmFzZTY0LWVuY29kZWQtand0LXNlY3JldC1yZXBsYWNlLWluLXByb2R1Y3Rpb24="

  # SSL/TLS certificates (placeholder - replace with actual certificates)
  tls.crt: ""
  tls.key: ""

  # External API keys (placeholder - add as needed)
  ALPHAVANTAGE_API_KEY: ""
  FINNHUB_API_KEY: ""
  QUANDL_API_KEY: ""

---
# Registry secret for pulling images
apiVersion: v1
kind: Secret
metadata:
  name: registry-secret
  namespace: cbsc-strategy
  labels:
    app: cbsc-strategy
    component: registry
type: kubernetes.io/dockerconfigjson
data:
  # .dockerconfigjson: "<base64-encoded-docker-config>"
  # Generate with: kubectl create secret docker-registry registry-secret --docker-server=<registry-url> --docker-username=<username> --docker-password=<password> --docker-email=<email> --dry-run=client -o yaml
  .dockerconfigjson: ""