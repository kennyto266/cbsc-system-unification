---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cbsc-system
  labels:
    app: cbsc-frontend
    component: web
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: cbsc-frontend
      component: web
      tier: frontend
  template:
    metadata:
      labels:
        app: cbsc-frontend
        component: web
        tier: frontend
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: frontend
          image: ghcr.io/your-org/cbsc-strategy-management-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
              protocol: TCP
          env:
            - name: REACT_APP_API_BASE_URL
              value: "https://cbsc.example.com/api"
            - name: REACT_APP_WS_URL
              value: "wss://cbsc.example.com/ws"
            - name: REACT_APP_ENVIRONMENT
              value: "production"
            - name: REACT_APP_DOMAIN
              value: "cbsc.example.com"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
            successThreshold: 1
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
            successThreshold: 1
          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/sh
                  - -c
                  - "sleep 10"
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - cbsc-frontend
                topologyKey: kubernetes.io/hostname