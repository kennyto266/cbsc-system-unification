---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: cbsc-system
  labels:
    app: postgres
    component: database
    tier: backend
spec:
  type: ClusterIP
  ports:
    - port: 5432
      targetPort: 5432
      protocol: TCP
      name: postgres
  selector:
    app: postgres
    component: database
    tier: backend
  sessionAffinity: None