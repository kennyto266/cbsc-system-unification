---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: cbsc-system
  labels:
    app: cbsc-backend
    component: api
    tier: backend
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-backend-protocol: "tcp"
spec:
  type: ClusterIP
  ports:
    - port: 8000
      targetPort: 8000
      protocol: TCP
      name: http
  selector:
    app: cbsc-backend
    component: api
    tier: backend
  sessionAffinity: None