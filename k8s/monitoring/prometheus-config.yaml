---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: cbsc-monitoring
  labels:
    app: prometheus
    component: monitoring
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'cbsc-production'
        region: 'us-east-1'

    rule_files:
      - "/etc/prometheus/rules/*.yml"

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
              - alertmanager:9093

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Kubernetes API Server
      - job_name: 'kubernetes-apiservers'
        kubernetes_sd_configs:
          - role: endpoints
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        relabel_configs:
          - source_labels: [__meta_kubernetes_namespace, __meta_kubernetes_service_name, __meta_kubernetes_endpoint_port_name]
            action: keep
            regex: default;kubernetes;https

      # Node Exporter (system metrics)
      - job_name: 'kubernetes-nodes'
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics

      # Kubelet metrics
      - job_name: 'kubernetes-kubelet'
        scheme: https
        tls_config:
          ca_file: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token
        kubernetes_sd_configs:
          - role: node
        relabel_configs:
          - action: labelmap
            regex: __meta_kubernetes_node_label_(.+)
          - target_label: __address__
            replacement: kubernetes.default.svc:443
          - source_labels: [__meta_kubernetes_node_name]
            regex: (.+)
            target_label: __metrics_path__
            replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor

      # CBSC Backend Services
      - job_name: 'cbsc-backend'
        kubernetes_sd_configs:
          - role: endpoints
          namespaces:
            names:
              - cbsc-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_path]
            action: replace
            target_label: __metrics_path__
            regex: (.+)
          - source_labels: [__address__, __meta_kubernetes_service_annotation_prometheus_io_port]
            action: replace
            regex: ([^:]+)(?::\d+)?;(\d+)
            replacement: $1:$2
            target_label: __address__
          - action: labelmap
            regex: __meta_kubernetes_service_label_(.+)
          - source_labels: [__meta_kubernetes_namespace]
            action: replace
            target_label: kubernetes_namespace
          - source_labels: [__meta_kubernetes_service_name]
            action: replace
            target_label: kubernetes_name

      # PostgreSQL Exporter
      - job_name: 'postgres-exporter'
        kubernetes_sd_configs:
          - role: endpoints
          namespaces:
            names:
              - cbsc-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: postgres-exporter-service
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: metrics
            action: keep

      # Redis Exporter
      - job_name: 'redis-exporter'
        kubernetes_sd_configs:
          - role: endpoints
          namespaces:
            names:
              - cbsc-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: redis-exporter-service
            action: keep

      # InfluxDB Exporter
      - job_name: 'influxdb-exporter'
        kubernetes_sd_configs:
          - role: endpoints
          namespaces:
            names:
              - cbsc-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: influxdb-service
            action: keep
          - source_labels: [__meta_kubernetes_endpoint_port_name]
            regex: http
            action: keep
          - target_label: __metrics_path__
            replacement: /metrics

      # Nginx Exporter
      - job_name: 'nginx-exporter'
        kubernetes_sd_configs:
          - role: endpoints
          namespaces:
            names:
              - cbsc-system
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: nginx-service
            action: keep
          - source_labels: [__meta_kubernetes_service_annotation_prometheus_io_scrape]
            action: keep
            regex: true

      # Grafana
      - job_name: 'grafana'
        kubernetes_sd_configs:
          - role: endpoints
          namespaces:
            names:
              - cbsc-monitoring
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            regex: grafana-service
            action: keep

      # Blackbox Exporter (external monitoring)
      - job_name: 'blackbox-icmp'
        metrics_path: /probe
        params:
          module: [icmp]
        static_configs:
          - targets:
            - 8.8.8.8
            - 1.1.1.1
            - google.com
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter:9115

      - job_name: 'blackbox-http'
        metrics_path: /probe
        params:
          module: [http_2xx]
        static_configs:
          - targets:
            - https://cbsc.example.com
            - https://api.cbsc.example.com/health
            - https://grafana.cbsc.example.com
        relabel_configs:
          - source_labels: [__address__]
            target_label: __param_target
          - source_labels: [__param_target]
            target_label: instance
          - target_label: __address__
            replacement: blackbox-exporter:9115

  # Alert Rules
  alerts.yml: |
    groups:
    - name: cbsc.rules
      rules:
      # Backend Service Alerts
      - alert: BackendDown
        expr: up{job="cbsc-backend"} == 0
        for: 1m
        labels:
          severity: critical
          service: backend
        annotations:
          summary: "Backend service is down"
          description: "Backend service has been down for more than 1 minute"

      - alert: HighErrorRate
        expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors per second"

      - alert: HighLatency
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m])) > 0.5
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High latency detected"
          description: "95th percentile latency is {{ $value }} seconds"

      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes / container_spec_memory_limit_bytes) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High memory usage"
          description: "Memory usage is above 80% for {{ $labels.container }}"

      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: backend
        annotations:
          summary: "High CPU usage"
          description: "CPU usage is above 80% for {{ $labels.container }}"

      # Database Alerts
      - alert: PostgreSQLDown
        expr: up{job="postgres-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL database has been down for more than 1 minute"

      - alert: PostgreSQLTooManyConnections
        expr: pg_stat_activity_count > 80
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "PostgreSQL too many connections"
          description: "PostgreSQL has {{ $value }} active connections"

      - alert: PostgreSQLHighCPUUsage
        expr: rate(pg_stat_cpu_seconds_total[5m]) * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "PostgreSQL high CPU usage"
          description: "PostgreSQL CPU usage is {{ $value }}%"

      # Redis Alerts
      - alert: RedisDown
        expr: up{job="redis-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: cache
        annotations:
          summary: "Redis is down"
          description: "Redis cache has been down for more than 1 minute"

      - alert: RedisHighMemoryUsage
        expr: redis_memory_used_bytes / redis_memory_max_bytes * 100 > 80
        for: 5m
        labels:
          severity: warning
          service: cache
        annotations:
          summary: "Redis high memory usage"
          description: "Redis memory usage is {{ $value }}%"

      # InfluxDB Alerts
      - alert: InfluxDBDown
        expr: up{job="influxdb-exporter"} == 0
        for: 1m
        labels:
          severity: critical
          service: database
        annotations:
          summary: "InfluxDB is down"
          description: "InfluxDB has been down for more than 1 minute"

      - alert: InfluxDBHighDiskUsage
        expr: influxdb_disk_free / influxdb_disk_total * 100 < 20
        for: 5m
        labels:
          severity: warning
          service: database
        annotations:
          summary: "InfluxDB low disk space"
          description: "InfluxDB has {{ $value }}% free disk space"

      # Kubernetes Alerts
      - alert: KubernetesNodeReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 10m
        labels:
          severity: critical
          service: kubernetes
        annotations:
          summary: "Kubernetes Node not ready"
          description: "Node {{ $labels.node }} has been not ready for more than 10 minutes"

      - alert: PodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[15m]) > 0
        for: 5m
        labels:
          severity: warning
          service: kubernetes
        annotations:
          summary: "Pod is crash looping"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash looping"

      - alert: PodNotReady
        expr: kube_pod_status_ready{condition="true"} == 0
        for: 10m
        labels:
          severity: warning
          service: kubernetes
        annotations:
          summary: "Pod not ready"
          description: "Pod {{ $labels.namespace }}/{{ $labels.pod }} has been not ready for more than 10 minutes"

      # Business Metrics Alerts
      - alert: StrategyExecutionFailures
        expr: rate(strategy_execution_failures_total[5m]) > 0.1
        for: 2m
        labels:
          severity: warning
          service: business
        annotations:
          summary: "High strategy execution failure rate"
          description: "Strategy execution failure rate is {{ $value }} per second"

      - alert: LowTradingVolume
        expr: rate(trading_volume_total[1h]) < 100
        for: 30m
        labels:
          severity: warning
          service: business
        annotations:
          summary: "Low trading volume"
          description: "Trading volume is {{ $value }} per hour"

      - alert: UserLoginFailures
        expr: rate(user_login_failures_total[5m]) > 5
        for: 2m
        labels:
          severity: warning
          service: security
        annotations:
          summary: "High user login failure rate"
          description: "User login failure rate is {{ $value }} per second"