---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: cbsc-system
  labels:
    app: cbsc-strategy-management
    component: backend
type: Opaque
data:
  # Base64 encoded secrets - these should be replaced with actual encoded values
  # Use: echo -n "your-secret" | base64

  # Database Credentials
  postgres-password: ""
  redis-password: ""

  # Application Secrets
  jwt-secret: ""
  app-secret-key: ""

  # InfluxDB Credentials
  influxdb-token: ""
  influxdb-password: ""

  # External API Keys
  alpha-vantage-api-key: ""
  iex-cloud-api-key: ""
  finnhub-api-key: ""

  # Email Configuration
  email-password: ""

  # Notification Webhooks
  slack-webhook-url: ""
  discord-webhook-url: ""

  # SSL Certificates (if needed)
  ssl-cert: ""
  ssl-key: ""

  # AWS Credentials (for backups)
  aws-access-key-id: ""
  aws-secret-access-key: ""