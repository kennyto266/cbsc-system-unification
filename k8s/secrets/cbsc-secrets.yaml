---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: cbsc-system
  labels:
    app: postgres
    component: database
type: Opaque
data:
  # Base64 encoded values - replace with actual encoded values
  postgres-user: Y2JzY191c2Vy  # cbsc_user
  postgres-password: Y2JzY19wYXNzd29yZA==  # cbsc_password
  postgres-db: Y2JzY19zdHJhdGVneQ==  # cbsc_strategy
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: cbsc-system
  labels:
    app: redis
    component: cache
type: Opaque
data:
  redis-password: cmVkaXNfcGFzc3dvcmQ=  # redis_password
---
apiVersion: v1
kind: Secret
metadata:
  name: influxdb-secret
  namespace: cbsc-system
  labels:
    app: influxdb
    component: database
type: Opaque
data:
  influxdb-token: Y2JzYy1pbmZsdXhkYi10b2tlbi0xMjM0NTY3ODk=  # cbsc-influxdb-token-123456789
  influxdb-username: YWRtaW4=  # admin
  influxdb-password: Y2JzY19pbmZsdXhkX2FkbWlu  # cbsc_influx_admin
---
apiVersion: v1
kind: Secret
metadata:
  name: backend-secret
  namespace: cbsc-system
  labels:
    app: cbsc-backend
    component: api
type: Opaque
data:
  secret-key: eW91ci1zZWNyZXQta2V5LWNoYW5nZS1pbi1wcm9kdWN0aW9u  # your-secret-key-change-in-production
  jwt-secret-key: eW91ci1qd3Qtc2VjcmV0LWtleS1jaGFuZ2U=  # your-jwt-secret-key-change
---
apiVersion: v1
kind: Secret
metadata:
  name: ssl-certs
  namespace: cbsc-system
  labels:
    app: nginx
    component: proxy
type: kubernetes.io/tls
data:
  tls.crt: <base64-encoded-certificate>
  tls.key: <base64-encoded-private-key>
---
# Grafana secrets
apiVersion: v1
kind: Secret
metadata:
  name: grafana-secret
  namespace: cbsc-monitoring
  labels:
    app: grafana
    component: monitoring
type: Opaque
data:
  admin-user: YWRtaW4=  # admin
  admin-password: Z3JhZmFuYV9wYXNzd29yZA==  # grafana_password