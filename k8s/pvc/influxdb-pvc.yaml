---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: influxdb-pvc
  namespace: cbsc-system
  labels:
    app: influxdb
    component: database
    storage-tier: ssd
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: cbsc-ssd-storage
  resources:
    requests:
      storage: 50Gi
  volumeMode: Filesystem