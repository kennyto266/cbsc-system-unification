---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: cbsc-system
  labels:
    app: postgres
    component: database
    storage-tier: ssd
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: cbsc-ssd-storage
  resources:
    requests:
      storage: 100Gi
  volumeMode: Filesystem