---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: redis-pvc
  namespace: cbsc-system
  labels:
    app: redis
    component: cache
    storage-tier: ssd
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: cbsc-ssd-storage
  resources:
    requests:
      storage: 10Gi
  volumeMode: Filesystem