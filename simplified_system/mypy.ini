# Mypy Configuration for Phase 3 Real-time Infrastructure
# Phase 3 實時基礎設施 Mypy 配置

[mypy]
# Global Settings
python_version = 3.8
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True
warn_redundant_casts = True
warn_unused_ignores = True
warn_no_return = True
warn_unreachable = True
strict_equality = True

# Import Discovery
ignore_missing_imports = False
follow_imports = normal
follow_imports_for_stubs = True

# Platform Configuration
platform = linux

# Error Messages
show_error_codes = True
show_error_context = True
color_output = true
error_summary = true

# Report Generation
html_report = mypy_html_report
junit_xml = mypy_junit_report

# Exclude directories/files
exclude = (
    ^build/,
    ^dist/,
    ^\.git/,
    ^\.mypy_cache/,
    ^\.venv/,
    ^venv/,
    ^__pycache__,
)

# Incremental Mode
incremental = True
cache_dir = .mypy_cache

# Parallel Processing
jobs = 4

# Per-module Configuration
[mypy-asyncio.*]
ignore_missing_imports = True

[mypy-fastapi.*]
ignore_missing_imports = True

[mypy-websockets.*]
ignore_missing_imports = True

[mypy-redis.*]
ignore_missing_imports = True

[mypy-numpy.*]
ignore_missing_imports = True

[mypy-pandas.*]
ignore_missing_imports = True

[mypy-pydantic.*]
ignore_missing_imports = True

[mypy-ujson.*]
ignore_missing_imports = True

[mypy-zlib.*]
ignore_missing_imports = True

[mypy-json.*]
ignore_missing_imports = True

[mypy-logging.*]
ignore_missing_imports = True

# Phase 3 Specific Configuration
[mypy-src.realtime.*]
# Enable strict checking for Phase 3 modules
strict = True
warn_return_any = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
disallow_untyped_decorators = True
no_implicit_optional = True

# Known issues (temporarily ignore)
[mypy-src.realtime.websocket_server]
# Allow some untyped code during migration
disallow_untyped_defs = False
check_untyped_defs = True

[mypy-src.realtime.data_pipeline]
# Allow some untyped code during migration
disallow_untyped_defs = False
check_untyped_defs = True

[mypy-src.realtime.redis_cache]
# Allow some untyped code during migration
disallow_untyped_defs = False
check_untyped_defs = True

[mypy-src.realtime.data_validator]
# Allow some untyped code during migration
disallow_untyped_defs = False
check_untyped_defs = True