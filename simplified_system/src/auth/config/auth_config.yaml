# Authentication System Configuration
# 认证系统配置

version: "1.0.0"
description: "Multi-layer data authenticity verification system configuration"

# Authentication Manager Settings
# 认证管理器设置
authenticity_manager:
  max_history_size: 1000
  default_timeout: 30.0
  parallel_execution: true
  enable_caching: true
  max_cache_size: 5000
  cache_ttl_seconds: 3600

# Verifier Configuration
# 验证器配置
verifiers:
  # Digital Signature Verifier
  digital_signature:
    enabled: true
    priority: 100
    config:
      require_signature: true
      trusted_sources:
        - "hkma.gov.hk"
        - "data.gov.hk"
        - "official.gov.hk"
      signature_algorithms:
        - "RSA-256"
        - "ECDSA"
        - "ED25519"
      certificate_validation: true

  # Blockchain Verification
  blockchain_verification:
    enabled: false
    priority: 90
    config:
      network: "ethereum"
      contract_address: null
      gas_limit: 100000
      confirmations_required: 3

  # Statistical Analysis Verifier
  statistical_analysis:
    enabled: true
    priority: 80
    config:
      outlier_detection: true
      confidence_threshold: 0.95
      min_sample_size: 30
      statistical_tests:
        - "ks_test"
        - "chi_square"
        - "z_score"
      anomaly_detection_methods:
        - "isolation_forest"
        - "local_outlier_factor"

  # Domain Validation Verifier
  domain_validation:
    enabled: true
    priority: 70
    config:
      trusted_domains:
        - "*.gov.hk"
        - "*.hkma.gov.hk"
        - "*.data.gov.hk"
      require_https: true
      certificate_validation: true
      dns_validation: true
      reputation_check: true

  # Data Integrity Verifier
  data_integrity:
    enabled: true
    priority: 60
    config:
      hash_algorithm: "SHA256"
      require_checksum: true
      corruption_detection: true
      integrity_checks:
        - "format_validation"
        - "schema_validation"
        - "range_validation"
      backup_verification: true

  # Historical Pattern Verifier
  historical_pattern:
    enabled: true
    priority: 50
    config:
      lookback_days: 90
      pattern_similarity_threshold: 0.8
      anomaly_threshold: 2.0
      require_historical_data: true
      trend_analysis: true

  # Regulatory Compliance Verifier
  regulatory_compliance:
    enabled: true
    priority: 85
    config:
      compliance_standards:
        - "HKMA_Guidelines"
        - "ISO_27001"
        - "GDPR_Compliance"
      mandatory_fields:
        - "timestamp"
        - "source"
        - "data_hash"
      audit_trail: true

# Rules Engine Configuration
# 规则引擎配置
rules_engine:
  enabled: true
  rule_files:
    - "rules/authenticity_rules.yaml"
    - "rules/regulatory_rules.yaml"
    - "rules/data_quality_rules.yaml"
  execution_timeout: 60.0
  max_rules_per_execution: 100
  parallel_rule_execution: true

# Logging Configuration
# 日志配置
logging:
  level: "INFO"
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: "logs/auth_system.log"
  max_size_mb: 100
  backup_count: 5
  enable_file_logging: true
  enable_console_logging: true

# Cache Configuration
# 缓存配置
cache:
  enabled: true
  type: "memory"  # Options: memory, redis, file
  ttl_seconds: 3600
  max_size: 10000
  cleanup_interval_seconds: 300

# Monitoring and Alerting
# 监控和警报
monitoring:
  enabled: true
  metrics_collection: true
  alert_thresholds:
    failure_rate: 0.1  # 10%
    average_execution_time_ms: 5000
    queue_depth: 1000
  notification_channels:
    - "log"
    - "email"
    - "webhook"

# Performance Settings
# 性能设置
performance:
  max_concurrent_verifications: 50
  thread_pool_size: 20
  async_timeout: 30.0
  retry_attempts: 3
  retry_delay_ms: 1000

# Security Settings
# 安全设置
security:
  encrypt_cached_data: true
  api_key_required: false
  rate_limiting:
    enabled: true
    requests_per_minute: 1000
  access_control:
    enabled: false
    allowed_ips: []