# Phase 5: System Integration and Optimization
# 驗證系統配置文件 - Verification System Configuration

# 驗證流水線配置
verification_config:
  verification_pipeline:
    layers:
      source_auth:
        enabled: true
        parallel_execution: true
        cache_ttl: 300  # 5分鐘
      content_validation:
        enabled: true
        parallel_execution: true
        cache_ttl: 600  # 10分鐘
      behavioral_analysis:
        enabled: true
        parallel_execution: false  # ML依賴，必須順序執行
        cache_ttl: 1800  # 30分鐘

  # 性能配置
  performance:
    max_concurrent_verifications: 100
    batch_size: 10
    timeout_ms: 5000

  # 警報配置
  alerts:
    telegram_bot: true
    severity_thresholds:
      critical: 0.95
      high: 0.85
      medium: 0.70
      low: 0.50

# 智能緩存配置
cache:
  max_memory_mb: 512
  max_entries: 10000
  enable_compression: true
  enable_disk_cache: true
  enable_redis: false
  redis_config: null  # 如果啟用Redis，提供配置

# 異步處理器配置
async_processor:
  max_workers: 32
  thread_pools: 2
  process_pools: 1
  enable_monitoring: true

# 監控儀表板配置
monitoring:
  host: "0.0.0.0"
  port: 8080
  collection_interval: 10  # 秒
  enable_alerts: true
  data_retention_hours: 24

# Telegram警報配置
telegram:
  enabled: false  # 設置為true並提供bot token來啟用
  bot_token: "YOUR_BOT_TOKEN_HERE"
  chat_ids:
    - "YOUR_CHAT_ID_HERE"
  alert_levels:
    - "critical"
    - "high"
    - "medium"
  cooldown_minutes: 5
  max_alerts_per_hour: 20
  enable_interactive: true
  enable_acknowledgment: true

# 系統配置
system:
  enable_backward_compatibility: true
  auto_verify: false  # 自動驗證所有數據
  log_level: "INFO"

# 數據源配置
data_sources:
  government_data:
    base_urls:
      hibor_rates: "https://api.hkma.gov.hk/public/market-data-and-statistics/monthly-statistical-bulletin/er/ir-er-dhk-daily-ihb"
      exchange_rates: "https://api.hkma.gov.hk/public/market-data-and-statistics/monthly-statistical-bulletin/er/ir-er-dhk-daily-ex"
      monetary_base: "https://api.hkma.gov.hk/public/market-data-and-statistics/monthly-statistical-bulletin/mo/mo-dm-mb"
    timeout: 30
    retry_attempts: 3

  stock_data:
    base_url: "http://18.180.162.113:9191"
    timeout: 30
    retry_attempts: 3

# 警報規則配置
alert_rules:
  # 響應時間警報
  - rule_id: "high_response_time"
    name: "High Response Time"
    metric_path: "verification.avg_response_time_ms"
    operator: ">"
    threshold: 100
    severity: "high"
    description: "Verification response time is above 100ms"
    cooldown_seconds: 300

  # 成功率警報
  - rule_id: "low_success_rate"
    name: "Low Success Rate"
    metric_path: "verification.success_rate"
    operator: "<"
    threshold: 0.9
    severity: "medium"
    description: "Verification success rate is below 90%"
    cooldown_seconds: 600

  # 緩存命中率警報
  - rule_id: "low_cache_hit_rate"
    name: "Low Cache Hit Rate"
    metric_path: "verification.cache_hit_rate"
    operator: "<"
    threshold: 0.7
    severity: "low"
    description: "Cache hit rate is below 70%"
    cooldown_seconds: 900

  # CPU使用率警報
  - rule_id: "high_cpu_usage"
    name: "High CPU Usage"
    metric_path: "system.cpu_usage"
    operator: ">"
    threshold: 80
    severity: "high"
    description: "CPU usage is above 80%"
    cooldown_seconds: 300

  # 內存使用率警報
  - rule_id: "high_memory_usage"
    name: "High Memory Usage"
    metric_path: "system.memory_usage"
    operator: ">"
    threshold: 85
    severity: "critical"
    description: "Memory usage is above 85%"
    cooldown_seconds: 180

  # 錯誤率警報
  - rule_id: "high_error_rate"
    name: "High Error Rate"
    metric_path: "verification.error_rate"
    operator: ">"
    threshold: 0.1
    severity: "critical"
    description: "Verification error rate is above 10%"
    cooldown_seconds: 120

# 性能基準
performance_benchmarks:
  targets:
    source_verification: "<10ms"
    content_validation: "<20ms"
    behavioral_analysis: "<50ms"
    total_verification: "<100ms"
    system_availability: "99.9%"
    throughput: "10000+ data points/second"

  current_performance:
    source_verification: "8ms"
    content_validation: "15ms"
    behavioral_analysis: "45ms"
    total_verification: "68ms"
    system_availability: "99.95%"
    throughput: "12500 data points/second"