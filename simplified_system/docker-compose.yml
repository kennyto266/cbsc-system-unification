# 生产级量化交易系统 Docker Compose 配置
version: '3.8'

services:
  # 主要API服务
  quant-api:
    build: .
    container_name: quant-api-1
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql://postgres:quantpass123@postgres:5432/quantdb
      - INFLUXDB_URL=http://influxdb:8086
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - WORKERS=8
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./config:/app/config
    depends_on:
      - redis
      - postgres
      - influxdb
    networks:
      - quant-network
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 4G
        reservations:
          cpus: '2'
          memory: 2G

  # 优化工作节点 (多实例)
  optimization-worker:
    build: .
    restart: unless-stopped
    environment:
      - REDIS_URL=redis://redis:6379/0
      - POSTGRES_URL=postgresql://postgres:quantpass123@postgres:5432/quantdb
      - WORKER_TYPE=optimization
      - CONCURRENCY=4
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      - redis
      - postgres
    networks:
      - quant-network
    deploy:
      replicas: 3
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: quant-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 4gb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - quant-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G

  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: quant-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=quantdb
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=quantpass123
      - POSTGRES_INITDB_ARGS=--encoding=UTF-8 --lc-collate=C --lc-ctype=C
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./deployment/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - quant-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # InfluxDB时序数据库
  influxdb:
    image: influxdb:2-alpine
    container_name: quant-influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    environment:
      - INFLUXDB_DB=quant_metrics
      - INFLUXDB_ADMIN_USER=admin
      - INFLUXDB_ADMIN_PASSWORD=quantadmin123
      - INFLUXDB_USER=quant
      - INFLUXDB_USER_PASSWORD=quantpass123
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - quant-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Prometheus监控
  prometheus:
    image: prom/prometheus:latest
    container_name: quant-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    volumes:
      - ./deployment/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - quant-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Grafana可视化
  grafana:
    image: grafana/grafana:latest
    container_name: quant-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=quantadmin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./deployment/grafana/provisioning:/etc/grafana/provisioning
    networks:
      - quant-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Elasticsearch日志存储
  elasticsearch:
    image: elasticsearch:8.11.1
    container_name: quant-elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ports:
      - "9200:9200"
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    networks:
      - quant-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Kibana日志可视化
  kibana:
    image: kibana:8.11.1
    container_name: quant-kibana
    restart: unless-stopped
    ports:
      - "5601:5601"
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    depends_on:
      - elasticsearch
    networks:
      - quant-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 1G

  # Nginx负载均衡器
  nginx:
    image: nginx:alpine
    container_name: quant-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./static:/app/static
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - quant-api
    networks:
      - quant-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

networks:
  quant-network:
    driver: bridge
    ipam:
      driver: default
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  influxdb_data:
    driver: local
  influxdb_config:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  elasticsearch_data:
    driver: local