version: '3.8'

services:
  # CBSC Strategy API服务
  cbsc-strategy-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cbsc-strategy-api
    ports:
      - "3004:3004"
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-cbsc_admin}:${POSTGRES_PASSWORD}@${POSTGRES_HOST:-postgres}:5432/${POSTGRES_DB:-cbsc_production}
      - POSTGRES_DB=${POSTGRES_DB:-cbsc_production}
      - POSTGRES_USER=${POSTGRES_USER:-cbsc_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      - POSTGRES_HOST=${POSTGRES_HOST:-postgres}
      - POSTGRES_PORT=5432
      - REDIS_URL=redis://redis:6379/0
      - CACHE_TTL=3600
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:?Set JWT_SECRET_KEY in .env}
      - API_RATE_LIMIT=100/minute
      - ENVIRONMENT=production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3004/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - cbsc-network

  # PostgreSQL数据库
  postgres:
    image: postgres:15-alpine
    container_name: cbsc-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-cbsc_production}
      POSTGRES_USER: ${POSTGRES_USER:-cbsc_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbsc_admin -d cbsc_production"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - cbsc-network

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: cbsc-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    restart: unless-stopped
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cbsc-network

  # Nginx反向代理
  nginx:
    image: nginx:alpine
    container_name: cbsc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - cbsc-strategy-api
    restart: unless-stopped
    networks:
      - cbsc-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  cbsc-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16