
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSC 策略管理系统</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        h1 {
            text-align: center;
            margin-bottom: 30px;
        }
        .status {
            background: rgba(0, 255, 0, 0.2);
            padding: 10px;
            border-radius: 5px;
            margin: 10px 0;
        }
        .api-link {
            display: block;
            background: rgba(255, 255, 255, 0.2);
            padding: 15px;
            margin: 10px 0;
            border-radius: 5px;
            text-decoration: none;
            color: white;
            transition: background 0.3s;
        }
        .api-link:hover {
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 CBSC 量化交易策略管理系统</h1>

        <div class="status">
            ✅ 系统状态: 运行中
        </div>

        <h2>📊 系统功能</h2>
        <a href="http://localhost:3004/api/v1/strategies/" class="api-link" target="_blank">
            策略管理 API (v1.0)
        </a>
        <a href="http://localhost:3004/docs" class="api-link" target="_blank">
            API 文档
        </a>
        <a href="http://localhost:3004/health" class="api-link" target="_blank">
            系统健康检查
        </a>

        <h2>🎯 个人使用场景</h2>
        <p>这是一个专为个人股票策略回测设计的系统，帮助您：</p>
        <ul>
            <li>创建和管理量化交易策略</li>
            <li>进行历史数据回测</li>
            <li>分析 Sharpe Ratio (SR) 和最大回撤 (MDD)</li>
            <li>优化策略参数</li>
        </ul>

        <div style="margin-top: 30px; padding: 20px; background: rgba(255, 255, 255, 0.1); border-radius: 10px;">
            <h3>📈 快速开始</h3>
            <p>1. 访问 API 文档了解接口</p>
            <p>2. 创建您的第一个策略</p>
            <p>3. 运行回测分析</p>
            <p>4. 查看 SR 和 MDD 指标</p>
        </div>
    </div>
</body>
</html>
