version: '3.8'

services:
  # Main backtesting service
  backtesting-engine:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      target: production
    container_name: cbsc-backtesting-engine
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "8080:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://backtest:backtest123@postgres:5432/backtest
      - LOG_LEVEL=INFO
      - MAX_WORKERS=4
      - GPU_ENABLED=false
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../results:/app/results
      - cache_volume:/app/cache
    depends_on:
      - redis
      - postgres
    networks:
      - backtesting-network
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # GPU-enabled backtesting service
  backtesting-gpu:
    build:
      context: ..
      dockerfile: docker/Dockerfile.gpu
    container_name: cbsc-backtesting-gpu
    restart: unless-stopped
    ports:
      - "8001:8000"
      - "8081:8080"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://backtest:backtest123@postgres:5432/backtest
      - LOG_LEVEL=INFO
      - MAX_WORKERS=8
      - GPU_ENABLED=true
      - CUDA_VISIBLE_DEVICES=0
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
      - ../results:/app/results
      - gpu_cache_volume:/app/cache
    depends_on:
      - redis
      - postgres
    networks:
      - backtesting-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python", "-c", "import cupy; import requests; cupy.cuda.Device(0).use(); requests.get('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    profiles:
      - gpu

  # Redis cache service
  redis:
    image: redis:7-alpine
    container_name: cbsc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - backtesting-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: cbsc-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=backtest
      - POSTGRES_USER=backtest
      - POSTGRES_PASSWORD=backtest123
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    networks:
      - backtesting-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backtest -d backtest"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Monitoring service (Prometheus)
  prometheus:
    image: prom/prometheus:latest
    container_name: cbsc-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - backtesting-network
    profiles:
      - monitoring

  # Visualization service (Grafana)
  grafana:
    image: grafana/grafana:latest
    container_name: cbsc-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin123
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
    networks:
      - backtesting-network
    depends_on:
      - prometheus
    profiles:
      - monitoring

  # Load balancer (Nginx)
  nginx:
    image: nginx:alpine
    container_name: cbsc-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - backtesting-engine
      - backtesting-gpu
    networks:
      - backtesting-network
    profiles:
      - production

networks:
  backtesting-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  cache_volume:
    driver: local
  gpu_cache_volume:
    driver: local