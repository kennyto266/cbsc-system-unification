# CBSC Backtest API v2.0 Docker Compose
# ===================================

version: '3.8'

services:
  # Redis Cache and Task Queue
  redis:
    image: redis:7-alpine
    container_name: cbsc-backtest-redis
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backtest-network

  # PostgreSQL Database (Optional for persistent storage)
  postgres:
    image: postgres:15-alpine
    container_name: cbsc-backtest-db
    environment:
      POSTGRES_DB: backtest_db
      POSTGRES_USER: backtest_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-backtest_pass}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U backtest_user -d backtest_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - backtest-network

  # Backtest API Service v2.0
  backtest-api-v2:
    build:
      context: ..
      dockerfile: docker/backtest-api.dockerfile
    container_name: cbsc-backtest-api-v2
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://backtest_user:backtest_pass@postgres:5432/backtest_db
      API_HOST: 0.0.0.0
      API_PORT: 8002
      MAX_WORKERS: 10
      ENABLE_MONITORING: "true"
      CACHE_TTL: 3600
      LOG_LEVEL: INFO
      CORS_ORIGINS: "http://localhost:3000,http://localhost:3004"
      ENVIRONMENT: production
    ports:
      - "8002:8002"
    volumes:
      - ../logs:/app/logs
      - ../cache:/app/cache
      - ../templates:/app/templates
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - backtest-network
    restart: unless-stopped

  # Prometheus for Metrics Collection
  prometheus:
    image: prom/prometheus:latest
    container_name: cbsc-prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - backtest-network
    restart: unless-stopped

  # Grafana for Visualization
  grafana:
    image: grafana/grafana:latest
    container_name: cbsc-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: false
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - backtest-network
    restart: unless-stopped

  # Nginx Reverse Proxy (Optional)
  nginx:
    image: nginx:alpine
    container_name: cbsc-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
      - ./ssl:/etc/nginx/ssl
    depends_on:
      - backtest-api-v2
    networks:
      - backtest-network
    restart: unless-stopped

# Networks
networks:
  backtest-network:
    driver: bridge

# Volumes
volumes:
  redis_data:
    driver: local
  postgres_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local